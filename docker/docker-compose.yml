version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: teacher_research_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: teacher_research
      MYSQL_USER: tr_user
      MYSQL_PASSWORD: tr_pass_2025
    ports:
      - "3307:3306"     # 用3307避免和本地已有的3306冲突
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/01_init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --init-connect=SET NAMES utf8mb4
      - --skip-character-set-client-handshake
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10
