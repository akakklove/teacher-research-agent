services:
  mysql:
    image: mysql:8.0
    container_name: tr_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: teacher_research
      MYSQL_USER: tr_user
      MYSQL_PASSWORD: tr_pass_2025
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --init-connect=SET NAMES utf8mb4
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "tr_user", "-ptr_pass_2025"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: tr_app
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: tr_user
      DB_PASSWORD: tr_pass_2025
      DB_NAME: teacher_research
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-teacher-research-secret-key-2025}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./exports:/app/exports
      - ./data:/app/data

volumes:
  mysql_data:
