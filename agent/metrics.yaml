  # ── 项目补充 ──
  - id: project_duration
    name: "项目周期分布"
    category: "项目概览"
    priority: 42
    description: "主持项目的执行周期"
    sql_template: |
      SELECT CASE WHEN DATEDIFF(p.jzrq, p.lxrq) <= 365 THEN '1年以内'
                  WHEN DATEDIFF(p.jzrq, p.lxrq) <= 730 THEN '1-2年'
                  WHEN DATEDIFF(p.jzrq, p.lxrq) <= 1095 THEN '2-3年'
                  ELSE '3年以上' END as label,
             COUNT(*) as value
      FROM t_ky_xmry r
      JOIN t_ky_xmjbxx p ON r.kybh = p.kybh
      WHERE r.ry_gh = :teacher_id AND r.smsx = 1
        AND p.lxrq BETWEEN :start_date AND :end_date
      GROUP BY CASE WHEN DATEDIFF(p.jzrq, p.lxrq) <= 365 THEN '1年以内'
                    WHEN DATEDIFF(p.jzrq, p.lxrq) <= 730 THEN '1-2年'
                    WHEN DATEDIFF(p.jzrq, p.lxrq) <= 1095 THEN '2-3年'
                    ELSE '3年以上' END
    chart_type: "pie_chart"
    unit: "个"
    role_filter: true

