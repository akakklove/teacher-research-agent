  sql_template: SELECT DATE_FORMAT(f.pz_rq,'%Y-%m') as label, SUM(f.wb_je) as value FROM t_ky_xmry r JOIN t_ky_jfwb f ON r.kybh=f.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1 AND f.pz_rq BETWEEN :start_date
    AND :end_date GROUP BY DATE_FORMAT(f.pz_rq,'%Y-%m') ORDER BY label
