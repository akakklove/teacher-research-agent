  # ── 论文补充 ──
  - id: paper_department_comparison
    name: "同院论文对比"
    category: "论文成果"
    priority: 45
    description: "与同院系教师论文产出对比"
    sql_template: |
      SELECT j.xm as label,
             COUNT(DISTINCT a.lwbh) as value
      FROM t_jzg_jbxx j
      LEFT JOIN t_ky_lwzz a ON j.gh = a.zzgh AND a.smsx = 1
      LEFT JOIN t_ky_lw p ON a.lwbh = p.lwbh AND p.fbn BETWEEN :start_year AND :end_year
      WHERE j.dw_mc = (SELECT dw_mc FROM t_jzg_jbxx WHERE gh = :teacher_id)
      GROUP BY j.gh, j.xm
      ORDER BY value DESC
