  unit: 元/年
- id: fund_yoy_growth
  name: 经费同比增长率
  category: 经费分析
  priority: 44
  description: 到账经费同比增长
  data_sources:
  - table: t_ky_xmry
    role: 主持人
    key_field: ry_gh
  - table: t_ky_jfdz
    role: 到账
    key_field: dz_je
  sql_template: SELECT ROUND((COALESCE(SUM(CASE WHEN YEAR(f.pz_rq)=:end_year THEN f.dz_je ELSE 0 END),0)-COALESCE(SUM(CASE WHEN YEAR(f.pz_rq)=:start_year THEN f.dz_je ELSE 0 END),0))*100.0/NULLIF(SUM(CASE
    WHEN YEAR(f.pz_rq)=:start_year THEN f.dz_je ELSE 0 END),0),1) as value FROM t_ky_xmry r JOIN t_ky_jfdz f ON r.kybh=f.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1
  chart_type: kpi_card
  unit: '%'
- id: fund_spent_ratio
  name: 支出占比
  category: 经费分析
  priority: 45
  description: 支出占到账经费比例
  data_sources:
  - table: t_ky_xmry
    role: 主持人
    key_field: ry_gh
  - table: t_ky_jfdz
    role: 到账
    key_field: dz_je
  - table: t_ky_jfzc
    role: 支出
    key_field: zc_je
  sql_template: SELECT ROUND(COALESCE((SELECT SUM(zc_je) FROM t_ky_jfzc WHERE kybh IN (SELECT kybh FROM t_ky_xmry WHERE ry_gh=:teacher_id AND smsx=1) AND pz_rq BETWEEN :start_date AND :end_date),0)*100.0/NULLIF(COALESCE((SELECT
    SUM(dz_je) FROM t_ky_jfdz WHERE kybh IN (SELECT kybh FROM t_ky_xmry WHERE ry_gh=:teacher_id AND smsx=1) AND pz_rq BETWEEN :start_date AND :end_date),0),0),1) as value
  chart_type: kpi_card
  unit: '%'
- id: fund_per_project_avg_arrived
