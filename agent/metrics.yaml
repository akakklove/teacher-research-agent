# ============================================
# 教师个人科研查询器 — 指标定义文件
# 版本: v3.0.0 (200+ metrics, 三维分类体系)
# ============================================
#
# 指标分类:
#   基础指标 (Base)     — COUNT / SUM / AVG 直接查询
#   派生指标 (Derived)  — 比率 / 占比 / 年均 / 同比增长
#   复合指标 (Composite)— 加权积分 / 百分位 / 汇总表
#
# 覆盖维度: 项目|经费|论文|专利|获奖|著作|软著|会议|排名|汇总|合作|时间
# ============================================

version: 3.0.0
total_metrics: 201
metrics:
- id: project_count_total
  name: 参与项目总数
  category: 项目概览
  priority: 1
  description: 教师参与的所有科研项目数量
  data_sources:
  - table: t_ky_xmry
    role: 人员项目关联
    key_field: ry_gh
  sql_template: SELECT COUNT(DISTINCT kybh) as value FROM t_ky_xmry WHERE ry_gh = :teacher_id
  chart_type: kpi_card
  unit: 个
- id: project_count_leader
  name: 主持项目数
  category: 项目概览
  priority: 2
  description: 教师作为项目负责人的科研项目数
  data_sources:
  - table: t_ky_xmry
    role: 主持(smsx=1)
    key_field: ry_gh, smsx
  sql_template: SELECT COUNT(DISTINCT kybh) as value FROM t_ky_xmry WHERE ry_gh = :teacher_id AND smsx = 1
  chart_type: kpi_card
  unit: 个
  role_filter: true
- id: project_count_participant
  name: 参与项目数(非主持)
  category: 项目概览
  priority: 3
  description: 作为参与者的项目数
  data_sources:
  - table: t_ky_xmry
    role: 参与
    key_field: ry_gh, smsx
  sql_template: SELECT COUNT(DISTINCT kybh) as value FROM t_ky_xmry WHERE ry_gh = :teacher_id AND smsx != 1
  chart_type: kpi_card
  unit: 个
- id: project_active_count
  name: 在研项目数
  category: 项目概览
  priority: 4
  description: 当前在研项目数量
  data_sources:
  - table: t_ky_xmry
    role: 人员
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 状态
    key_field: zxzt_bm
  sql_template: SELECT COUNT(DISTINCT r.kybh) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id AND p.zxzt_bm='ZAIYAN'
  chart_type: kpi_card
  unit: 个
- id: project_completed_count
  name: 已结题项目数
  category: 项目概览
  priority: 5
  description: 已结题项目数量
  data_sources:
  - table: t_ky_xmry
    role: 人员
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 状态
    key_field: zxzt_bm
  sql_template: SELECT COUNT(DISTINCT r.kybh) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id AND p.zxzt_bm='JIETI'
  chart_type: kpi_card
  unit: 个
- id: project_count_national
  name: 国家级项目数
  category: 项目概览
  priority: 6
  description: 国家级项目总数
  data_sources:
  - table: t_ky_xmry
    role: 人员
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 级别
    key_field: xmjb_bm
  sql_template: SELECT COUNT(DISTINCT r.kybh) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id AND p.xmjb_bm LIKE 'GJJ%'
  chart_type: kpi_card
  unit: 个
- id: project_count_provincial
  name: 省部级项目数
  category: 项目概览
  priority: 7
  description: 省部级及以上项目数
  data_sources:
  - table: t_ky_xmry
    role: 人员
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 级别
    key_field: xmjb_bm
  sql_template: SELECT COUNT(DISTINCT r.kybh) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id AND (p.xmjb_bm LIKE 'GJJ%' OR p.xmjb_bm LIKE 'SBJ%')
  chart_type: kpi_card
  unit: 个
- id: project_by_level
  name: 项目级别分布
  category: 项目概览
  priority: 8
  description: 按级别统计项目数量
  data_sources:
  - table: t_ky_xmry
    role: 人员
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 级别
    key_field: xmjb_bm
  sql_template: SELECT p.xmjb_bm as label, COUNT(DISTINCT r.kybh) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id GROUP BY p.xmjb_bm ORDER BY value DESC
  chart_type: pie_chart
- id: project_by_source
  name: 项目来源分布
  category: 项目概览
  priority: 9
  description: 按来源统计项目
  data_sources:
  - table: t_ky_xmry
    role: 人员
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 来源
    key_field: xmlx_bm
  sql_template: SELECT p.xmlx_bm as label, COUNT(DISTINCT r.kybh) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id GROUP BY p.xmlx_bm ORDER BY value DESC
  chart_type: pie_chart
- id: project_by_nature
  name: 项目性质分布
  category: 项目概览
  priority: 10
  description: 纵向/横向分布
  data_sources:
  - table: t_ky_xmry
    role: 人员
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 性质
    key_field: xmxz_bm
  sql_template: SELECT p.xmxz_bm as label, COUNT(DISTINCT r.kybh) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id GROUP BY p.xmxz_bm ORDER BY value DESC
  chart_type: pie_chart
- id: project_status_distribution
  name: 项目状态分布
  category: 项目概览
  priority: 11
  description: 在研/结题/中止占比
  data_sources:
  - table: t_ky_xmry
    role: 人员
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 状态
    key_field: zxzt_bm
  sql_template: SELECT p.zxzt_bm as label, COUNT(DISTINCT r.kybh) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id GROUP BY p.zxzt_bm ORDER BY value DESC
  chart_type: pie_chart
- id: project_yearly_trend
  name: 年度立项趋势
  category: 项目概览
  priority: 12
  description: 按年度统计新立项项目数
  data_sources:
  - table: t_ky_xmry
    role: 人员
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 立项日期
    key_field: lxrq
  sql_template: SELECT YEAR(p.lxrq) as label, COUNT(DISTINCT r.kybh) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id AND YEAR(p.lxrq) BETWEEN :start_year AND :end_year
    GROUP BY YEAR(p.lxrq) ORDER BY label
  chart_type: line_chart
- id: project_by_year_level
  name: 项目年度×级别分布
  category: 项目概览
  priority: 13
  description: 年度和级别交叉统计
  data_sources:
  - table: t_ky_xmry
    role: 人员
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 立项+级别
    key_field: lxrq, xmjb_bm
  sql_template: SELECT CONCAT(YEAR(p.lxrq),'-',p.xmjb_bm) as label, COUNT(DISTINCT r.kybh) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id AND YEAR(p.lxrq) BETWEEN
    :start_year AND :end_year GROUP BY YEAR(p.lxrq), p.xmjb_bm ORDER BY YEAR(p.lxrq)
  chart_type: stacked_bar
- id: project_avg_duration_days
  name: 项目平均周期(天)
  category: 项目概览
  priority: 14
  description: 从立项到结题平均天数
  data_sources:
  - table: t_ky_xmry
    role: 人员
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 日期
    key_field: lxrq, jxrq, jhwcrq
  sql_template: SELECT ROUND(AVG(DATEDIFF(COALESCE(p.jxrq,p.jhwcrq),p.lxrq))) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1 AND p.lxrq IS NOT NULL
  chart_type: kpi_card
  unit: 天
- id: project_duration_distribution
  name: 项目周期分布
  category: 项目概览
  priority: 15
  description: 不同周期区间的项目数
  data_sources:
  - table: t_ky_xmry
    role: 人员
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 日期
    key_field: lxrq, jxrq
  sql_template: SELECT CASE WHEN DATEDIFF(COALESCE(p.jxrq,p.jhwcrq),p.lxrq)<=365 THEN '<=1年' WHEN DATEDIFF(COALESCE(p.jxrq,p.jhwcrq),p.lxrq)<=730 THEN '1-2年' WHEN DATEDIFF(COALESCE(p.jxrq,p.jhwcrq),p.lxrq)<=1095
    THEN '2-3年' ELSE '>3年' END as label, COUNT(*) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1 AND p.lxrq IS NOT NULL GROUP BY label ORDER BY value
    DESC
  chart_type: bar_chart
- id: project_fund_total_contract
  name: 合同经费总额
  category: 项目概览
  priority: 16
  description: 主持项目合同经费合计
  data_sources:
  - table: t_ky_xmry
    role: 主持人
    key_field: ry_gh, smsx
  - table: t_ky_xmjbxx
    role: 经费
    key_field: ht_jf
  sql_template: SELECT COALESCE(SUM(p.ht_jf),0) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1
  chart_type: kpi_card
  unit: 元
- id: project_fund_total_match
  name: 配套经费总额
  category: 项目概览
  priority: 17
  description: 主持项目配套经费合计
  data_sources:
  - table: t_ky_xmry
    role: 主持人
    key_field: ry_gh, smsx
  - table: t_ky_xmjbxx
    role: 配套经费
    key_field: pt_jf
  sql_template: SELECT COALESCE(SUM(p.pt_jf),0) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1
  chart_type: kpi_card
  unit: 元
- id: project_fund_avg_per_project
  name: 项目均经费
  category: 项目概览
  priority: 18
  description: 平均每项目经费额度
  data_sources:
  - table: t_ky_xmry
    role: 主持人
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 经费
    key_field: ht_jf, pt_jf
  sql_template: SELECT ROUND(COALESCE(AVG(p.ht_jf+p.pt_jf),0)) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1
  chart_type: kpi_card
  unit: 元/项
- id: project_fund_ranking
  name: 项目经费排名
  category: 项目概览
  priority: 19
  description: 主持项目按合同经费降序
  data_sources:
  - table: t_ky_xmry
    role: 主持人
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 项目
    key_field: xmmc, ht_jf, pt_jf
  sql_template: SELECT p.xmmc as label, (p.ht_jf+p.pt_jf) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1 ORDER BY value DESC
  chart_type: bar_chart
  unit: 元
- id: project_detail_list
  name: 项目明细列表
  category: 项目概览
  priority: 20
  description: 个人所有项目详细信息
  data_sources:
  - table: t_ky_xmry
    role: 人员
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 完整信息
    key_field: xmmc,xmjb_bm,xmxz_bm,xmlx_bm,lxrq,jxrq,ht_jf,pt_jf,zxzt_bm,htbh
  sql_template: SELECT p.xmmc as 项目名称, p.xmjb_bm as 项目级别, p.xmxz_bm as 性质, p.xmlx_bm as 来源, DATE_FORMAT(p.lxrq,'%Y-%m-%d') as 立项日期, DATE_FORMAT(COALESCE(p.jxrq,p.jhwcrq),'%Y-%m-%d') as 预计结题, p.ht_jf as
    合同经费, p.pt_jf as 配套经费, p.zxzt_bm as 执行状态 FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id ORDER BY p.lxrq DESC
  chart_type: table
- id: project_completion_rate
  name: 项目结题率
  category: 项目概览
  priority: 21
  description: 已结题项目占全部项目比例
  data_sources:
  - table: t_ky_xmry
    role: 人员
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 状态
    key_field: zxzt_bm
  sql_template: SELECT ROUND(SUM(CASE WHEN p.zxzt_bm='JIETI' THEN 1 ELSE 0 END)*100.0/COUNT(*),1) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id
  chart_type: kpi_card
  unit: '%'
- id: project_leader_ratio
  name: 主持项目占比
  category: 项目概览
  priority: 22
  description: 主持项目占总项目比例
  data_sources:
  - table: t_ky_xmry
    role: 人员
    key_field: ry_gh, smsx
  sql_template: SELECT ROUND(SUM(CASE WHEN smsx=1 THEN 1 ELSE 0 END)*100.0/COUNT(DISTINCT kybh),1) as value FROM t_ky_xmry WHERE ry_gh=:teacher_id
  chart_type: kpi_card
  unit: '%'
- id: project_national_ratio
  name: 国家级项目占比
  category: 项目概览
  priority: 23
  description: 国家级项目占总项目比例
  data_sources:
  - table: t_ky_xmry
    role: 人员
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 级别
    key_field: xmjb_bm
  sql_template: SELECT ROUND(SUM(CASE WHEN p.xmjb_bm LIKE 'GJJ%' THEN 1 ELSE 0 END)*100.0/COUNT(DISTINCT r.kybh),1) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id
  chart_type: kpi_card
  unit: '%'
- id: project_lateral_ratio
  name: 横向项目占比
  category: 项目概览
  priority: 24
  description: 横向项目占总项目比例
  data_sources:
  - table: t_ky_xmry
    role: 人员
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 性质
    key_field: xmxz_bm
  sql_template: SELECT ROUND(SUM(CASE WHEN p.xmxz_bm='HX' THEN 1 ELSE 0 END)*100.0/COUNT(DISTINCT r.kybh),1) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id
  chart_type: kpi_card
  unit: '%'
- id: project_yoy_growth
  name: 项目数年增长率
  category: 项目概览
  priority: 25
  description: 当年新立项数同比增长率
  data_sources:
  - table: t_ky_xmry
    role: 人员
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 日期
    key_field: lxrq
  sql_template: SELECT ROUND((COUNT(CASE WHEN YEAR(p.lxrq)=:end_year THEN 1 END)-COUNT(CASE WHEN YEAR(p.lxrq)=:start_year THEN 1 END))*100.0/NULLIF(COUNT(CASE WHEN YEAR(p.lxrq)=:start_year THEN 1 END),0),1)
    as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1
  chart_type: kpi_card
  unit: '%'
- id: fund_total_arrived
  name: 到账经费总额
  category: 经费分析
  priority: 31
  description: 主持项目经费到账总额
  data_sources:
  - table: t_ky_xmry
    role: 主持人
    key_field: ry_gh
  - table: t_ky_jfdz
    role: 到账明细
    key_field: dz_je
  sql_template: SELECT COALESCE(SUM(f.dz_je),0) as value FROM t_ky_xmry r JOIN t_ky_jfdz f ON r.kybh=f.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1 AND f.pz_rq BETWEEN :start_date AND :end_date
  chart_type: kpi_card
  unit: 元
- id: fund_total_spent
  name: 经费支出总额
  category: 经费分析
  priority: 32
  description: 主持项目经费支出总额
  data_sources:
  - table: t_ky_xmry
    role: 主持人
    key_field: ry_gh
  - table: t_ky_jfzc
    role: 支出明细
    key_field: zc_je
  sql_template: SELECT COALESCE(SUM(f.zc_je),0) as value FROM t_ky_xmry r JOIN t_ky_jfzc f ON r.kybh=f.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1 AND f.pz_rq BETWEEN :start_date AND :end_date
  chart_type: kpi_card
  unit: 元
- id: fund_total_outbound
  name: 经费外拨总额
  category: 经费分析
  priority: 33
  description: 主持项目经费外拨总额
  data_sources:
  - table: t_ky_xmry
    role: 主持人
    key_field: ry_gh
  - table: t_ky_jfwb
    role: 外拨明细
    key_field: wb_je
  sql_template: SELECT COALESCE(SUM(f.wb_je),0) as value FROM t_ky_xmry r JOIN t_ky_jfwb f ON r.kybh=f.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1 AND f.pz_rq BETWEEN :start_date AND :end_date
  chart_type: kpi_card
  unit: 元
- id: fund_net_balance
  name: 经费净余额
  category: 经费分析
  priority: 34
  description: 到账-支出-外拨 净余额
  data_sources:
  - table: t_ky_xmry
    role: 主持人
    key_field: ry_gh
  - table: t_ky_jfdz
    role: 到账
    key_field: dz_je
  - table: t_ky_jfzc
    role: 支出
    key_field: zc_je
  sql_template: SELECT COALESCE((SELECT SUM(dz_je) FROM t_ky_jfdz WHERE kybh IN (SELECT kybh FROM t_ky_xmry WHERE ry_gh=:teacher_id AND smsx=1) AND pz_rq BETWEEN :start_date AND :end_date),0) - COALESCE((SELECT
    SUM(zc_je) FROM t_ky_jfzc WHERE kybh IN (SELECT kybh FROM t_ky_xmry WHERE ry_gh=:teacher_id AND smsx=1) AND pz_rq BETWEEN :start_date AND :end_date),0) as value
  chart_type: kpi_card
  unit: 元
- id: fund_execution_rate
  name: 经费执行率
  category: 经费分析
  priority: 35
  description: 支出/到账执行率
  data_sources:
  - table: t_ky_xmry
    role: 主持人
    key_field: ry_gh
  - table: t_ky_jfdz
    role: 到账
    key_field: dz_je
  - table: t_ky_jfzc
    role: 支出
    key_field: zc_je
  sql_template: SELECT ROUND(COALESCE((SELECT SUM(zc_je) FROM t_ky_jfzc WHERE kybh IN (SELECT kybh FROM t_ky_xmry WHERE ry_gh=:teacher_id AND smsx=1) AND pz_rq BETWEEN :start_date AND :end_date),0)*100.0/NULLIF(COALESCE((SELECT
    SUM(dz_je) FROM t_ky_jfdz WHERE kybh IN (SELECT kybh FROM t_ky_xmry WHERE ry_gh=:teacher_id AND smsx=1) AND pz_rq BETWEEN :start_date AND :end_date),0),0),1) as value
  chart_type: kpi_card
  unit: '%'
- id: fund_monthly_trend
  name: 月度经费到账趋势
  category: 经费分析
  priority: 36
  description: 月度到账金额变化
  data_sources:
  - table: t_ky_xmry
    role: 主持人
    key_field: ry_gh
  - table: t_ky_jfdz
    role: 到账
    key_field: dz_je, pz_rq
  sql_template: SELECT DATE_FORMAT(f.pz_rq,'%Y-%m') as label, SUM(f.dz_je) as value FROM t_ky_xmry r JOIN t_ky_jfdz f ON r.kybh=f.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1 AND f.pz_rq BETWEEN :start_date
    AND :end_date GROUP BY DATE_FORMAT(f.pz_rq,'%Y-%m') ORDER BY label
  chart_type: line_chart
  unit: 元
- id: fund_monthly_spent_trend
