  sql_template: SELECT MIN(YEAR(p.lxrq)) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id AND p.lxrq IS NOT NULL
