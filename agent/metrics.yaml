- id: fund_avg_annual_arrived
  name: 年均到账经费
  category: 经费分析
  priority: 43
  description: 平均每年到账金额
  data_sources:
  - table: t_ky_xmry
    role: 主持人
    key_field: ry_gh
  - table: t_ky_jfdz
    role: 到账
    key_field: dz_je
  sql_template: SELECT ROUND(COALESCE(SUM(f.dz_je),0)/NULLIF((:end_year-:start_year+1),0)) as value FROM t_ky_xmry r JOIN t_ky_jfdz f ON r.kybh=f.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1 AND f.pz_rq
    BETWEEN :start_date AND :end_date
