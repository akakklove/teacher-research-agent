  - id: award_yearly_trend
    name: "年度获奖趋势"
    category: "获奖荣誉"
    priority: 37
    description: "按年度统计获奖数量的变化趋势"
    sql_template: |
      SELECT YEAR(a.hjrq) as label,
             COUNT(DISTINCT r.hjbh) as value
