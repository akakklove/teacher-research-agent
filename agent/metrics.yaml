  # ── 论文补充 ──
  - id: paper_journal_source
    name: "期刊来源分布"
    category: "论文成果"
    priority: 31
    description: "发表论文的期刊/会议来源统计"
    data_sources:
      - table: "t_ky_lwzz"
        role: "论文作者关联"
      - table: "t_ky_lw"
        role: "刊物名称"
        join: "t_ky_lwzz.lwbh = t_ky_lw.lwbh"
        key_field: "kwmc"
    sql_template: |
      SELECT p.kwmc as label,
             COUNT(DISTINCT a.lwbh) as value
      FROM t_ky_lwzz a
      JOIN t_ky_lw p ON a.lwbh = p.lwbh
      WHERE a.zzgh = :teacher_id
        AND a.smsx = 1
        AND p.fbn BETWEEN :start_year AND :end_year
      GROUP BY p.kwmc
      ORDER BY value DESC
      LIMIT 10
    chart_type: "horizontal_bar"
    unit: "篇"

  - id: paper_author_ranking
    name: "作者排名分布"
    category: "论文成果"
    priority: 32
    description: "教师在不同位次上发表的论文数"
    data_sources:
      - table: "t_ky_lwzz"
        role: "论文作者关联"
        key_field: "zzgh, smsx"
    sql_template: |
      SELECT CASE WHEN a.smsx = 1 THEN '第一作者'
                  WHEN a.smsx = 2 THEN '第二作者'
                  WHEN a.smsx = 3 THEN '通讯作者'
                  ELSE '其他作者' END as label,
             COUNT(DISTINCT a.lwbh) as value
      FROM t_ky_lwzz a
      JOIN t_ky_lw p ON a.lwbh = p.lwbh
      WHERE a.zzgh = :teacher_id
        AND p.fbn BETWEEN :start_year AND :end_year
      GROUP BY CASE WHEN a.smsx = 1 THEN '第一作者'
                    WHEN a.smsx = 2 THEN '第二作者'
                    WHEN a.smsx = 3 THEN '通讯作者'
                    ELSE '其他作者' END
      ORDER BY value DESC
    chart_type: "pie_chart"
    unit: "篇"

