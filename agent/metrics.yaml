  - table: t_ky_xmjbxx
    role: 经费
    key_field: ht_jf, pt_jf
  sql_template: SELECT MAX(p.ht_jf+p.pt_jf) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1
  chart_type: kpi_card
  unit: 元
- id: project_count_by_start_date
  name: 按立项年月分布
  category: 项目概览
  priority: 28
  description: 项目数量按月分布
  data_sources:
  - table: t_ky_xmry
    role: 人员
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 日期
    key_field: lxrq
  sql_template: SELECT DATE_FORMAT(p.lxrq,'%Y-%m') as label, COUNT(DISTINCT r.kybh) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id AND p.lxrq BETWEEN :start_date
    AND :end_date GROUP BY DATE_FORMAT(p.lxrq,'%Y-%m') ORDER BY label
  chart_type: line_chart
- id: project_longest_duration_days
  name: 最长项目周期(天)
  category: 项目概览
  priority: 29
  description: 周期最长的项目天数
  data_sources:
  - table: t_ky_xmry
    role: 主持人
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 日期
    key_field: lxrq, jxrq, jhwcrq
  sql_template: SELECT MAX(DATEDIFF(COALESCE(p.jxrq,p.jhwcrq),p.lxrq)) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1
  chart_type: kpi_card
  unit: 天
- id: fund_arrived_ranking_by_year
  name: 年度到账排名
  category: 经费分析
  priority: 49
  description: 各年度到账经费对比排名
  data_sources:
  - table: t_ky_xmry
    role: 主持
    key_field: ry_gh
  - table: t_ky_jfdz
    role: 到账
    key_field: dz_je, pz_rq
  sql_template: SELECT YEAR(f.pz_rq) as label, SUM(f.dz_je) as value FROM t_ky_xmry r JOIN t_ky_jfdz f ON r.kybh=f.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1 AND f.pz_rq BETWEEN :start_date AND :end_date
    GROUP BY YEAR(f.pz_rq) ORDER BY value DESC
  chart_type: bar_chart
  unit: 元
- id: fund_spent_ranking_by_year
  name: 年度支出排名
  category: 经费分析
  priority: 50
  description: 各年度支出对比排名
  data_sources:
  - table: t_ky_xmry
    role: 主持
    key_field: ry_gh
  - table: t_ky_jfzc
    role: 支出
    key_field: zc_je, pz_rq
  sql_template: SELECT YEAR(f.pz_rq) as label, SUM(f.zc_je) as value FROM t_ky_xmry r JOIN t_ky_jfzc f ON r.kybh=f.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1 AND f.pz_rq BETWEEN :start_date AND :end_date
    GROUP BY YEAR(f.pz_rq) ORDER BY value DESC
  chart_type: bar_chart
  unit: 元
- id: fund_monthly_avg_arrived
  name: 月均到账额
  category: 经费分析
  priority: 51
  description: 月均到账经费
  data_sources:
  - table: t_ky_xmry
    role: 主持
    key_field: ry_gh
  - table: t_ky_jfdz
    role: 到账
    key_field: dz_je
  sql_template: SELECT ROUND(COALESCE(SUM(f.dz_je),0)/NULLIF(TIMESTAMPDIFF(MONTH,:start_date,:end_date),0)) as value FROM t_ky_xmry r JOIN t_ky_jfdz f ON r.kybh=f.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1
    AND f.pz_rq BETWEEN :start_date AND :end_date
  chart_type: kpi_card
  unit: 元/月
- id: fund_outbound_ratio
  name: 外拨经费占比
  category: 经费分析
  priority: 52
  description: 外拨/到账比例
  data_sources:
  - table: t_ky_xmry
    role: 主持
    key_field: ry_gh
  - table: t_ky_jfdz
    role: 到账
    key_field: dz_je
  - table: t_ky_jfwb
    role: 外拨
    key_field: wb_je
  sql_template: SELECT ROUND(COALESCE((SELECT SUM(wb_je) FROM t_ky_jfwb WHERE kybh IN (SELECT kybh FROM t_ky_xmry WHERE ry_gh=:teacher_id AND smsx=1) AND pz_rq BETWEEN :start_date AND :end_date),0)*100.0/NULLIF(COALESCE(SELECT
    SUM(dz_je) FROM t_ky_jfdz WHERE kybh IN (SELECT kybh FROM t_ky_xmry WHERE ry_gh=:teacher_id AND smsx=1) AND pz_rq BETWEEN :start_date AND :end_date,0),0),1) as value
  chart_type: kpi_card
  unit: '%'
- id: fund_income_structure
  name: 经费收入结构
  category: 经费分析
  priority: 53
  description: 到账经费科目分布
  data_sources:
  - table: t_ky_xmry
    role: 主持人
    key_field: ry_gh
  - table: t_ky_jfdz
    role: 到账科目
    key_field: km_mc, dz_je
  sql_template: SELECT f.km_mc as label, SUM(f.dz_je) as value FROM t_ky_xmry r JOIN t_ky_jfdz f ON r.kybh=f.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1 AND f.pz_rq BETWEEN :start_date AND :end_date GROUP
    BY f.km_mc ORDER BY value DESC
  chart_type: pie_chart
- id: paper_level_ratio
  name: 高级别论文占比
  category: 论文成果
  priority: 81
  description: SCI/EI/核心占比
  data_sources:
  - table: t_ky_lwzz
    role: 作者
    key_field: zzgh
  - table: t_ky_lw
    role: 级别
    key_field: kwjb, slqk
  sql_template: SELECT ROUND(SUM(CASE WHEN p.kwjb LIKE '%SCI%' OR p.kwjb LIKE '%EI%' OR p.slqk LIKE '%核心%' THEN 1 ELSE 0 END)*100.0/COUNT(DISTINCT a.lwbh),1) as value FROM t_ky_lwzz a JOIN t_ky_lw p ON
    a.lwbh=p.lwbh WHERE a.zzgh=:teacher_id
  chart_type: kpi_card
  unit: '%'
- id: paper_domestic_count
  name: 国内论文数
  category: 论文成果
  priority: 82
  description: 国内期刊论文数
  data_sources:
  - table: t_ky_lwzz
    role: 作者
    key_field: zzgh
  - table: t_ky_lw
    role: 收录
    key_field: slqk
  sql_template: SELECT COUNT(DISTINCT a.lwbh) as value FROM t_ky_lwzz a JOIN t_ky_lw p ON a.lwbh=p.lwbh WHERE a.zzgh=:teacher_id AND (p.slqk LIKE '%中文%' OR p.slqk LIKE '%国内%' OR p.slqk NOT LIKE '%国际%')
  chart_type: kpi_card
  unit: 篇
- id: paper_peak_year
  name: 论文产出高峰年
  category: 论文成果
  priority: 83
  description: 发表论文最多的年份
  data_sources:
  - table: t_ky_lwzz
    role: 作者
    key_field: zzgh
  - table: t_ky_lw
    role: 日期
    key_field: fbn
  sql_template: SELECT YEAR(p.fbn) as value FROM t_ky_lwzz a JOIN t_ky_lw p ON a.lwbh=p.lwbh WHERE a.zzgh=:teacher_id AND p.fbn IS NOT NULL GROUP BY YEAR(p.fbn) ORDER BY COUNT(*) DESC LIMIT 1
  chart_type: kpi_card
  unit: 年
- id: paper_collaboration_ratio
  name: 合作论文占比
  category: 论文成果
  priority: 84
  description: 非独著论文占比
  data_sources:
  - table: t_ky_lwzz
    role: 全部
    key_field: lwbh
  sql_template: SELECT ROUND(SUM(CASE WHEN cnt>1 THEN 1 ELSE 0 END)*100.0/COUNT(*),1) as value FROM (SELECT lwbh, COUNT(*) as cnt FROM t_ky_lwzz GROUP BY lwbh) t
  chart_type: kpi_card
  unit: '%'
- id: paper_annual_growth_rate
  name: 论文年均增长率
  category: 论文成果
  priority: 85
  description: 论文数的年均复合增长率
  data_sources:
  - table: t_ky_lwzz
    role: 作者
    key_field: zzgh
  - table: t_ky_lw
    role: 日期
    key_field: fbn
  sql_template: SELECT ROUND((POWER(COUNT(DISTINCT a.lwbh)/NULLIF(COUNT(DISTINCT CASE WHEN YEAR(p.fbn)=:start_year THEN a.lwbh END),0),1.0/(:end_year-:start_year+1))-1)*100,1) as value FROM t_ky_lwzz a
    JOIN t_ky_lw p ON a.lwbh=p.lwbh WHERE a.zzgh=:teacher_id AND YEAR(p.fbn) BETWEEN :start_year AND :end_year
  chart_type: kpi_card
  unit: '%'
- id: patent_grant_rate
  name: 专利授权率
  category: 专利成果
  priority: 100
  description: 已授权专利占全部比例
  data_sources:
  - table: t_ky_zlfmr
    role: 发明人
    key_field: fmr_gh
  - table: t_ky_zl
    role: 状态
    key_field: zlzt
  sql_template: SELECT ROUND(SUM(CASE WHEN p.zlzt LIKE '%授权%' THEN 1 ELSE 0 END)*100.0/COUNT(DISTINCT a.zlbh),1) as value FROM t_ky_zlfmr a JOIN t_ky_zl p ON a.zlbh=p.zlbh WHERE a.fmr_gh=:teacher_id
  chart_type: kpi_card
  unit: '%'
- id: patent_by_year_type
  name: 专利年度×类型
  category: 专利成果
  priority: 101
  description: 年份和类型交叉
