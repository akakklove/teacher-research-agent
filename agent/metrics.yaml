  description: 有正式登记号的软著
  data_sources:
  - table: t_ky_rjzzcy
    role: 成员
    key_field: zzryh
  - table: t_ky_rjzz
    role: 登记号
    key_field: rjzzdjh
  sql_template: SELECT COUNT(DISTINCT a.rjzzbh) as value FROM t_ky_rjzzcy a JOIN t_ky_rjzz p ON a.rjzzbh=p.rjzzbh WHERE a.zzryh=:teacher_id AND p.rjzzdjh IS NOT NULL AND p.rjzzdjh!=''
  chart_type: kpi_card
  unit: 项
- id: project_longest_name
  name: 周期最长项目
  category: 项目概览
  priority: 30
  description: 周期最长的项目名称
  data_sources:
  - table: t_ky_xmry
    role: 主持
    key_field: ry_gh, smsx
  - table: t_ky_xmjbxx
    role: 信息
    key_field: xmmc, lxrq, jxrq
  sql_template: SELECT p.xmmc as label, DATEDIFF(COALESCE(p.jxrq,p.jhwcrq),p.lxrq) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1 ORDER BY value DESC
    LIMIT 1
  chart_type: bar_chart
  unit: 天
- id: fund_min_month
  name: 最少到账月
  category: 经费分析
  priority: 57
  description: 月到账最低额
  data_sources:
  - table: t_ky_xmry
    role: 主持
    key_field: ry_gh
  - table: t_ky_jfdz
    role: 到账
    key_field: dz_je, pz_rq
  sql_template: SELECT DATE_FORMAT(f.pz_rq,'%Y-%m') as label, SUM(f.dz_je) as value FROM t_ky_xmry r JOIN t_ky_jfdz f ON r.kybh=f.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1 AND f.pz_rq BETWEEN :start_date
    AND :end_date GROUP BY DATE_FORMAT(f.pz_rq,'%Y-%m') ORDER BY value ASC LIMIT 1
  chart_type: bar_chart
  unit: 元
- id: paper_latest_year_count
  name: 最近一年论文数
  category: 论文成果
  priority: 90
  description: 最近一年发表量
  data_sources:
  - table: t_ky_lwzz
    role: 作者
    key_field: zzgh
  - table: t_ky_lw
    role: 日期
    key_field: fbn
  sql_template: SELECT COUNT(DISTINCT a.lwbh) as value FROM t_ky_lwzz a JOIN t_ky_lw p ON a.lwbh=p.lwbh WHERE a.zzgh=:teacher_id AND YEAR(p.fbn)=YEAR(:end_date)
  chart_type: kpi_card
  unit: 篇
- id: paper_highest_level
  name: 最高级别论文期刊
  category: 论文成果
  priority: 91
  description: 最高级别期刊发文
  data_sources:
  - table: t_ky_lwzz
    role: 作者
    key_field: zzgh
  - table: t_ky_lw
    role: 期刊
    key_field: kwmc, kwjb
  sql_template: SELECT p.kwmc as label, COUNT(*) as value FROM t_ky_lwzz a JOIN t_ky_lw p ON a.lwbh=p.lwbh WHERE a.zzgh=:teacher_id AND p.kwjb LIKE '%SCI%' GROUP BY p.kwmc ORDER BY value DESC LIMIT 3
  chart_type: bar_chart
- id: patent_by_app_year_status
  name: 专利申请年×状态
  category: 专利成果
  priority: 106
  description: 年份和状态交叉
  data_sources:
  - table: t_ky_zlfmr
    role: 发明人
    key_field: fmr_gh
  - table: t_ky_zl
    role: 专利
    key_field: sqrq, zlzt
  sql_template: SELECT CONCAT(YEAR(p.sqrq),'-',p.zlzt) as label, COUNT(DISTINCT a.zlbh) as value FROM t_ky_zlfmr a JOIN t_ky_zl p ON a.zlbh=p.zlbh WHERE a.fmr_gh=:teacher_id AND YEAR(p.sqrq) BETWEEN :start_year
    AND :end_year GROUP BY YEAR(p.sqrq), p.zlzt ORDER BY YEAR(p.sqrq)
  chart_type: stacked_bar
- id: award_latest_year_count
  name: 最近一年获奖
  category: 获奖荣誉
  priority: 126
  description: 最近一年获奖数
  data_sources:
  - table: t_ky_hjry
    role: 获奖人
    key_field: ry_gh
  - table: t_ky_hj
    role: 日期
    key_field: hjrq
  sql_template: SELECT COUNT(DISTINCT a.hjbh) as value FROM t_ky_hjry a JOIN t_ky_hj p ON a.hjbh=p.hjbh WHERE a.ry_gh=:teacher_id AND YEAR(p.hjrq)=YEAR(:end_date)
  chart_type: kpi_card
  unit: 项
- id: book_latest_year_count
  name: 最近一年出版
  category: 著作成果
  priority: 145
  description: 最近一年出版著作
  data_sources:
  - table: t_ky_zzzz
    role: 作者
    key_field: zzryh
  - table: t_ky_zz
    role: 日期
    key_field: cbrq
  sql_template: SELECT COUNT(DISTINCT a.zzbh) as value FROM t_ky_zzzz a JOIN t_ky_zz p ON a.zzbh=p.zzbh WHERE a.zzryh=:teacher_id AND YEAR(p.cbrq)=YEAR(:end_date)
  chart_type: kpi_card
  unit: 部
- id: conference_latest_year_count
  name: 最近一年会议
  category: 学术活动
  priority: 184
  description: 最近一年学术会议
  data_sources:
  - table: t_ky_xshy
    role: 主持
    key_field: zcr_gh
  sql_template: SELECT COUNT(*) as value FROM t_ky_xshy WHERE zcr_gh=:teacher_id AND YEAR(hyqsrq)=YEAR(:end_date)
  chart_type: kpi_card
  unit: 次
- id: conference_total_days
  name: 累计会议天数
  category: 学术活动
  priority: 185
  description: 所有会议累计天数
  data_sources:
  - table: t_ky_xshy
    role: 主持
    key_field: zcr_gh
  sql_template: SELECT COALESCE(SUM(DATEDIFF(hyjzrq,hyqsrq)),0) as value FROM t_ky_xshy WHERE zcr_gh=:teacher_id
  chart_type: kpi_card
  unit: 天
- id: achievement_trend_synthesis
  name: 成果综合趋势
  category: 综合汇总
  priority: 214
  description: 5维度综合趋势
  data_sources:
  - table: 跨表
    role: 汇总
    key_field: ''
  sql_template: SELECT '项目' as label, COALESCE((SELECT COUNT(DISTINCT kybh) FROM t_ky_xmry WHERE ry_gh=:teacher_id),0) as value
  chart_type: bar_chart
- id: output_by_year_radar
  name: 年度产出雷达数据
  category: 综合汇总
  priority: 215
  description: 各维度年度产出对比
  data_sources:
  - table: 跨表
    role: 汇总
    key_field: ''
  sql_template: SELECT '论文' as name, COALESCE((SELECT COUNT(DISTINCT lwbh) FROM t_ky_lwzz WHERE zzgh=:teacher_id),0) as value UNION ALL SELECT '专利',COALESCE((SELECT COUNT(DISTINCT zlbh) FROM t_ky_zlfmr
    WHERE fmr_gh=:teacher_id),0) UNION ALL SELECT '项目',COALESCE((SELECT COUNT(DISTINCT kybh) FROM t_ky_xmry WHERE ry_gh=:teacher_id),0) UNION ALL SELECT '获奖',COALESCE((SELECT COUNT(DISTINCT hjbh) FROM t_ky_hjry
    WHERE ry_gh=:teacher_id),0) UNION ALL SELECT '著作',COALESCE((SELECT COUNT(DISTINCT zzbh) FROM t_ky_zzzz WHERE zzryh=:teacher_id),0)
  chart_type: radar_chart
- id: paper_detail_sci_list
  name: SCI论文明细列表
  category: 综合汇总
  priority: 216
  description: 全部SCI论文详情
  data_sources:
  - table: t_ky_lwzz
    role: 作者
    key_field: zzgh
  - table: t_ky_lw
    role: 信息
    key_field: lwmc,kwmc,kwjb,fbn
  sql_template: SELECT p.lwmc as 论文名称, p.kwmc as 期刊, p.kwjb as 级别, DATE_FORMAT(p.fbn,'%Y-%m-%d') as 发表日期 FROM t_ky_lwzz a JOIN t_ky_lw p ON a.lwbh=p.lwbh WHERE a.zzgh=:teacher_id AND p.kwjb LIKE '%SCI%'
    ORDER BY p.fbn DESC
  chart_type: table
- id: project_detail_leader_list
  name: 主持项目明细
  category: 综合汇总
  priority: 217
  description: 全部主持项目
  data_sources:
  - table: t_ky_xmry
    role: 主持
    key_field: ry_gh, smsx
  - table: t_ky_xmjbxx
    role: 项目
    key_field: xmmc,xmjb_bm,lxrq,ht_jf,zxzt_bm
  sql_template: SELECT p.xmmc as 项目名称, p.xmjb_bm as 级别, DATE_FORMAT(p.lxrq,'%Y-%m-%d') as 立项, p.ht_jf as 经费, p.zxzt_bm as 状态 FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id
    AND r.smsx=1 ORDER BY p.lxrq DESC
  chart_type: table
- id: yearly_paper_patent_ratio
  name: 论文专利比
  category: 年度对比
  priority: 293
  description: 每年论文与专利数量比
  data_sources:
  - table: 跨表
    role: 对比
    key_field: ''
  sql_template: SELECT ROUND(COALESCE((SELECT COUNT(DISTINCT lwbh) FROM t_ky_lwzz WHERE zzgh=:teacher_id),0)/NULLIF(COALESCE((SELECT COUNT(DISTINCT zlbh) FROM t_ky_zlfmr WHERE fmr_gh=:teacher_id),0),0),1)
    as value
  chart_type: kpi_card
- id: yearly_award_per_project
  name: 项目均获奖
  category: 年度对比
  priority: 294
  description: 每项目的平均获奖数
  data_sources:
  - table: t_ky_hjry
    role: 获奖
    key_field: ry_gh
  - table: t_ky_xmry
    role: 项目
    key_field: ry_gh
  sql_template: SELECT ROUND(COALESCE((SELECT COUNT(DISTINCT hjbh) FROM t_ky_hjry WHERE ry_gh=:teacher_id),0)/NULLIF((SELECT COUNT(DISTINCT kybh) FROM t_ky_xmry WHERE ry_gh=:teacher_id),0),1) as value
  chart_type: kpi_card
  unit: 项/项目
- id: project_fund_per_year_avg
  name: 项目年均经费投入
  category: 项目概览
  priority: 31
  description: 年均项目经费
  data_sources:
  - table: t_ky_xmry
    role: 主持
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 经费
    key_field: ht_jf, pt_jf
  - table: t_ky_jfdz
    role: 到账
    key_field: dz_je
  sql_template: SELECT ROUND(COALESCE(SUM(f.dz_je),0)/NULLIF((:end_year-:start_year+1),0)) as value FROM t_ky_xmry r JOIN t_ky_jfdz f ON r.kybh=f.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1 AND f.pz_rq
    BETWEEN :start_date AND :end_date
  chart_type: kpi_card
  unit: 元/年
- id: fund_top_project_name
  name: 经费最高项目
  category: 经费分析
  priority: 58
  description: 到账经费最高项目
  data_sources:
  - table: t_ky_xmry
    role: 主持
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 名称
    key_field: xmmc
  - table: t_ky_jfdz
    role: 到账
    key_field: dz_je
  sql_template: SELECT p.xmmc as label, COALESCE(SUM(f.dz_je),0) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh JOIN t_ky_jfdz f ON r.kybh=f.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1 AND
    f.pz_rq BETWEEN :start_date AND :end_date GROUP BY p.xmmc ORDER BY value DESC LIMIT 5
  chart_type: bar_chart
  unit: 元
- id: co_paper_count_leader
  name: 论文合作产出(主持)
  category: 合作网络
  priority: 235
  description: 作为通讯/一作的合作论文
  data_sources:
  - table: t_ky_lwzz
    role: 作者
    key_field: zzgh, smsx
  sql_template: SELECT COUNT(DISTINCT lwbh) as value FROM t_ky_lwzz WHERE zzgh=:teacher_id AND smsx IN (1,2) AND lwbh IN (SELECT lwbh FROM t_ky_lwzz GROUP BY lwbh HAVING COUNT(*)>1)
  chart_type: kpi_card
  unit: 篇
- id: scholar_impact_score
  name: 学术影响力指数
  category: 综合汇总
  priority: 218
  description: 综合产出加权指数
  data_sources:
  - table: 跨表
    role: 加权
    key_field: ''
  sql_template: SELECT 0 as value
  chart_type: kpi_card
- id: annual_summary_scorecard
  name: 年度总结评分卡
  category: 综合汇总
  priority: 219
  description: 年度成果评分汇总
  data_sources:
  - table: 跨表
    role: 评分
    key_field: ''
  sql_template: SELECT '2025' as 年度, 0 as 项目得分, 0 as 论文得分, 0 as 经费得分, 0 as 综合得分
  chart_type: table
