- id: fund_yearly_inout
  name: 年度收支对比
  category: 经费分析
  priority: 39
  description: 每年到账vs支出对比
  data_sources:
  - table: t_ky_xmry
    role: 主持人
    key_field: ry_gh
  - table: t_ky_jfdz
    role: 到账
    key_field: dz_je
  - table: t_ky_jfzc
    role: 支出
    key_field: zc_je
  sql_template: SELECT t.year as label, COALESCE(t.arrived,0) as 到账, COALESCE(t.spent,0) as 支出 FROM (SELECT YEAR(f.pz_rq) as year, SUM(f.dz_je) as arrived FROM t_ky_xmry r JOIN t_ky_jfdz f ON r.kybh=f.kybh
    WHERE r.ry_gh=:teacher_id AND r.smsx=1 AND f.pz_rq BETWEEN :start_date AND :end_date GROUP BY YEAR(f.pz_rq)) t LEFT JOIN (SELECT YEAR(f.pz_rq) as year, SUM(f.zc_je) as spent FROM t_ky_xmry r JOIN t_ky_jfzc
    f ON r.kybh=f.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1 AND f.pz_rq BETWEEN :start_date AND :end_date GROUP BY YEAR(f.pz_rq)) s ON t.year=s.year ORDER BY t.year
  chart_type: bar_chart
