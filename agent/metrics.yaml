    key_field: fbn
  sql_template: SELECT MIN(YEAR(p.fbn)) as value FROM t_ky_lwzz a JOIN t_ky_lw p ON a.lwbh=p.lwbh WHERE a.zzgh=:teacher_id AND p.fbn IS NOT NULL
  chart_type: kpi_card
  unit: 年
- id: career_active_years
  name: 科研活跃年数
  category: 时间分析
  priority: 253
  description: 从首次成果至今
  data_sources:
  - table: 时间计算
    role: 活跃年
    key_field: ''
  sql_template: SELECT (:end_year - COALESCE((SELECT MIN(YEAR(p.lxrq)) FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id AND p.lxrq IS NOT NULL),:start_year) + 1) as value
  chart_type: kpi_card
  unit: 年
- id: career_peak_fund_year
  name: 经费高峰年份
  category: 时间分析
  priority: 254
  description: 到账经费最高年份
  data_sources:
  - table: t_ky_jfdz
    role: 到账
    key_field: dz_je, pz_rq
  - table: t_ky_xmry
    role: 主持人
    key_field: ry_gh
  sql_template: SELECT YEAR(f.pz_rq) as label, SUM(f.dz_je) as value FROM t_ky_xmry r JOIN t_ky_jfdz f ON r.kybh=f.kybh WHERE r.ry_gh=:teacher_id AND r.smsx=1 GROUP BY YEAR(f.pz_rq) ORDER BY value DESC
    LIMIT 1
  chart_type: kpi_card
  unit: 年
- id: project_active_ratio
  name: 在研项目占比
  category: 项目概览
  priority: 26
  description: 在研项目占全部项目比例
  data_sources:
  - table: t_ky_xmry
    role: 人员
    key_field: ry_gh
  - table: t_ky_xmjbxx
    role: 状态
    key_field: zxzt_bm
  sql_template: SELECT ROUND(SUM(CASE WHEN p.zxzt_bm='ZAIYAN' THEN 1 ELSE 0 END)*100.0/COUNT(*),1) as value FROM t_ky_xmry r JOIN t_ky_xmjbxx p ON r.kybh=p.kybh WHERE r.ry_gh=:teacher_id
  chart_type: kpi_card
  unit: '%'
- id: project_max_fund_single
  name: 最大单项目经费
