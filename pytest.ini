[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记：跑得快的单元测试 vs 需要环境的集成测试
markers =
    unit: 纯逻辑测试，不需要数据库/LLM
    integration: 需要 MySQL/LLM 环境的集成测试
    slow: 耗时测试（如 LLM 调用）

# 输出
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
    -rA

# 默认只跑 unit 标记（不依赖外部服务）
# 需要跑全部时用: python -m pytest tests/ -m ""
# 只跑 unit:   python -m pytest tests/ -m unit
# 跑 fast:     python -m pytest tests/ -k "not slow"

# 忽略的目录
norecursedirs = data_governance .git data exports docker __pycache__

# filterwarnings
filterwarnings =
    ignore::DeprecationWarning
