<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教师科研助手 — 智能对话</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --bg: #f8f6f4;
    --card: rgba(255,255,255,0.7);
    --text: #1a1a2e;
    --text-light: #6b6b80;
    --text-muted: #a0a0b0;
    --primary: #6366f1;
    --primary-rgb: 99,102,241;
    --primary-light: rgba(99,102,241,0.08);
    --border: rgba(0,0,0,0.06);
    --user-bubble: #6366f1;
    --bot-bubble: rgba(255,255,255,0.75);
    --success: #10b981;
    --warning: #f59e0b;
    --error: #f43f5e;
    --ease-out: cubic-bezier(0.16,1,0.3,1);
    --ease-bounce: cubic-bezier(0.34,1.56,0.64,1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(167,139,250,0.1) 0%, transparent 50%),
      radial-gradient(ellipse 60% 40% at 85% 50%, rgba(251,191,146,0.08) 0%, transparent 40%);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── 顶部导航 ── */
  .header {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(20px) saturate(150%);
    border-bottom: 1px solid rgba(0,0,0,0.04);
    padding: 12px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .header .logo { font-size: 18px; }
  .header .title { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
  .header .subtitle { font-size: 12px; color: var(--text-light); margin-left: auto; }
  .header .session-badge { font-size: 10px; background: var(--primary-light); color: var(--primary); padding: 3px 10px; border-radius: 50px; }

  /* ── 聊天区 ── */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* 消息气泡 */
  .message { display: flex; align-items: flex-start; gap: 8px; max-width: 80%; animation: fadeUp 0.4s var(--ease-out) forwards; }
  .message.user   { align-self: flex-end; flex-direction: row-reverse; }
  .message.assistant { align-self: flex-start; }
  .bubble {
    padding: 14px 20px;
    border-radius: 24px;
    font-size: 14px;
    line-height: 1.55;
    position: relative;
    overflow: hidden;
  }
  .message.user .bubble {
    background: var(--user-bubble);
    color: #fff;
    border-bottom-right-radius: 8px;
    box-shadow: 0 4px 16px rgba(var(--primary-rgb),0.25);
  }
  .message.assistant .bubble {
    background: var(--bot-bubble);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(0,0,0,0.04);
    border-bottom-left-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.03);
  }
  .message.assistant .bubble::before {
    content: ''; position: absolute; top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(99,102,241,0.1) 50%, transparent);
  }

  /* 意图标签 */
  .intent-tag {
    display: inline-block;
    font-size: 10px;
    background: rgba(var(--primary-rgb),0.12);
    color: var(--primary);
    padding: 3px 10px;
    border-radius: 50px;
    margin-bottom: 6px;
    font-weight: 500;
  }

  /* KPI 小卡片 */
  .metric-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
  .metric-card {
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(0,0,0,0.04);
    border-radius: 16px;
    padding: 10px;
    text-align: center;
    transition: all 0.3s var(--ease-out);
  }
  .metric-card:hover { transform: translateY(-2px); }
  .metric-card .val { font-size: 18px; font-weight: 700; color: var(--primary); }
  .metric-card .lbl { font-size: 10px; color: var(--text-light); margin-top: 2px; }

  /* 洞察 */
  .insight-box {
    margin-top: 8px;
    padding: 12px 16px;
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.12);
    border-radius: 16px;
    font-size: 12px;
    color: #92400e;
  }

  /* 追问提示 */
  .followup-hint {
    margin-top: 6px;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ── 快捷按钮 ── */
  .quick-btn {
    padding: 7px 16px;
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 50px;
    background: rgba(255,255,255,0.6);
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.25s var(--ease-bounce);
    white-space: nowrap;
  }
  .quick-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    border-color: rgba(var(--primary-rgb),0.2);
  }

  /* ── 加载动画 ── */
  .loading-dots { display: flex; gap: 5px; padding: 10px 16px; }
  .loading-dots span {
    width: 8px; height: 8px; border-radius: 50%; background: var(--primary);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── 表格 ── */
  table { border-collapse: collapse; width: 100%; font-size: 11px; }
  th, td { padding: 5px 8px; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.04); }
  th { color: var(--text-light); font-weight: 500; font-size: 10px; text-transform: uppercase; letter-spacing: 0.03em; }
  tr:nth-child(even) td { background: rgba(0,0,0,0.01); }
  tr:hover td { background: rgba(var(--primary-rgb),0.03); }

  /* ── 输入区 ── */
  .input-area {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(0,0,0,0.04);
    padding: 14px 28px;
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  .input-area textarea {
    flex: 1;
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 16px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: inherit;
    background: rgba(255,255,255,0.6);
    resize: none;
    height: 44px;
    transition: all 0.2s;
  }
  .input-area textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(var(--primary-rgb),0.08);
  }
  .input-area button {
    border: none;
    background: var(--primary);
    color: #fff;
    border-radius: 50px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s var(--ease-bounce);
    box-shadow: 0 4px 16px rgba(var(--primary-rgb),0.3);
  }
  .input-area button:hover { transform: translateY(-1px) scale(1.03); box-shadow: 0 6px 20px rgba(var(--primary-rgb),0.4); }
  .input-area button:active { transform: scale(0.97); }
  .input-area button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ── 快速操作区 ── */
  .quick-actions { display: flex; gap: 6px; flex-wrap: wrap; padding: 4px 0; }
  .quick-actions .quick-btn { font-size: 11px; padding: 5px 12px; }

  /* ── 登录遮罩 ── */
  .login-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .login-card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(24px);
    border-radius: 28px;
    padding: 40px;
    width: 360px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.1);
  }
  .login-card h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 8px; }
  .login-card p { font-size: 13px; color: var(--text-light); margin-bottom: 20px; }
  .login-card select, .login-card input {
    width: 100%;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14px;
    margin-bottom: 12px;
    background: rgba(255,255,255,0.7);
    transition: all 0.2s;
  }
  .login-card select:focus, .login-card input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(var(--primary-rgb),0.1);
  }
  .login-card button {
    width: 100%;
    border: none;
    background: var(--primary);
    color: #fff;
    border-radius: 50px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s var(--ease-bounce);
    box-shadow: 0 4px 16px rgba(var(--primary-rgb),0.3);
  }
  .login-card button:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(var(--primary-rgb),0.4); }

  /* ── 模板面板 ── */
  #templates-panel {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(0,0,0,0.04);
    border-radius: 16px;
    padding: 14px;
    max-height: 200px;
    overflow-y: auto;
  }
</style></head>

<body>

<!-- 登录遮罩 -->
<div class="login-overlay" id="login-overlay">
  <div class="login-card">
    <h2>🏫 教师登录</h2>
    <p>输入工号和密码开始对话（初始密码为工号后6位）</p>
    <select id="teacher-select" style="width:100%;border:1px solid #e0e3eb;border-radius:8px;padding:10px;font-size:14px;margin-bottom:12px;">
      <option value="">— 选择教师 —</option>
    </select>
    <input type="password" id="login-password" placeholder="密码" style="width:100%;border:1px solid #e0e3eb;border-radius:8px;padding:10px;font-size:14px;margin-bottom:16px;">
    <button onclick="doLogin()">登录</button>
    <div id="login-error" style="color:#e17055;font-size:13px;margin-top:8px;display:none;"></div>
  </div>
</div>

<script>
// ── 全局状态 ──
let state = {
  sessionId: null,
  teacherId: null,
  teacherName: '',
  isLoading: false,
  lastMetricIds: [],
  token: null,
};

// ── 初始化（恢复登录态） ──
async function init() {
  // 从 localStorage 恢复 token
  const saved = localStorage.getItem('tr_token');
  if (saved) {
    try {
      const res = await fetch('/api/auth/me', {
        headers: { 'Authorization': `Bearer ${saved}` }
      });
      if (res.ok) {
        const user = await res.json();
        state.token = saved;
        state.teacherId = user.teacher_id;
        state.teacherName = user.name;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('teacher-label').textContent =
          `👤 ${user.name} · ${user.role === 'admin' ? '管理员' : ''} · 🔐 已登录`;
        document.getElementById('send-btn').disabled = false;
        addMessage('assistant', `👋 欢迎回来，${user.name}老师！`);
        return;
      }
    } catch(e) { localStorage.removeItem('tr_token'); }
  }

  // 加载教师列表
  try {
    const res = await fetch('/api/chat/sessions');
    if (!res.ok) throw new Error('服务未启动');
  } catch (e) {
    document.getElementById('chat-container').innerHTML =
      '<div style="text-align:center;padding:40px;color:#e17055;">⚠️ 服务未启动，请先运行 <code>python main.py</code></div>';
    return;
  }
  loadTeacherList();
}

async function loadTeacherList() {
  // 从已知工号加载（也可以新增 API）
  const ids = [];
  for (let i = 0; i < 50; i++) {
    ids.push(`GH2020${String(i).padStart(4, '0')}`);
  }

  const select = document.getElementById('teacher-select');
  select.innerHTML = ids.map(id => `<option value="${id}">${id}</option>`).join('');
}

// ── 开始对话 ──
async function doLogin() {
  const teacherId = document.getElementById('teacher-select').value;
  const password = document.getElementById('login-password').value;
  const errDiv = document.getElementById('login-error');
  if (!teacherId || !password) { errDiv.textContent = '请填写工号和密码'; errDiv.style.display = 'block'; return; }

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ teacher_id: teacherId, password: password }),
    });
    const data = await res.json();
    if (!res.ok) {
      errDiv.textContent = data.detail || '登录失败';
      errDiv.style.display = 'block';
      return;
    }

    state.token = data.token;
    state.teacherId = data.user.teacher_id;
    state.teacherName = data.user.name;
    localStorage.setItem('tr_token', data.token);

    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('teacher-label').textContent =
      `👤 ${data.user.name} · ${data.user.department} · 🔐 已登录`;
    document.getElementById('send-btn').disabled = false;

    addMessage('assistant',
      `👋 您好，${data.user.name}老师！我是您的科研助手。\n\n` +
      `您可以问我：\n• 帮我看看整体科研情况\n• 论文发表情况\n• 经费到账了多少\n• 点下方场景按钮一键生成报告`
    );
  } catch (e) {
    errDiv.textContent = '网络错误：' + e.message;
    errDiv.style.display = 'block';
  }
}

// v1.0: 生成大屏报告
function openDashboard(metricIds) {
  if (!state.teacherId) return;
  const mids = (metricIds.length > 0 ? metricIds : state.lastMetricIds).join(',');
  const url = `/api/teacher/${state.teacherId}/report?metric_ids=${mids}`;
  window.open(url, '_blank');
}

// v1.0: 导出按钮
async function exportReport(format) {
  if (!state.teacherId) { alert('请先登录'); return; }
  try {
    const res = await fetch('/api/export', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ teacher_id: state.teacherId, format: format, scenario_id: 'annual_summary' }),
    });
    if (!res.ok) { alert('导出失败'); return; }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = format === 'pptx' ? '科研报告.pptx' : '科研报告.md';
    a.click();
    URL.revokeObjectURL(url);
  } catch (e) { alert('导出失败: ' + e.message); }
}

// ── 发送消息 ──
async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || state.isLoading) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  setLoading(true);

  try {
    const body = { message: text };
    if (state.sessionId) body.session_id = state.sessionId;
    if (state.teacherId) body.teacher_id = state.teacherId;

    const res = await fetch('/api/chat/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || '请求失败');
    }

    const data = await res.json();
    state.sessionId = data.session_id;

    // 更新会话标签
    const badge = document.getElementById('session-badge');
    badge.style.display = 'inline-block';
    document.getElementById('sid').textContent = data.session_id;
    badge.onclick = () => navigator.clipboard.writeText(data.session_id);

    // 渲染回复
    renderAssistantReply(data);
  } catch (e) {
    addMessage('assistant', `❌ ${e.message}`);
  } finally {
    setLoading(false);
  }
}

function sendQuick(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

// ── 场景模板一键生成 ──
async function runScenario(scenarioId) {
  if (!state.teacherId || state.isLoading) return;
  setLoading(true);

  const labels = {
    annual_summary: '📝 年度科研总结',
    title_evaluation: '🏅 职称评审材料',
    grant_application: '💰 基金申报支撑',
  };

  try {
    const res = await fetch('/api/chat/scenario', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        scenario_id: scenarioId,
        teacher_id: state.teacherId,
      }),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || '生成失败');
    }

    const data = await res.json();

    // 渲染场景报告
    const container = document.getElementById('chat-container');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'message assistant';
    msgDiv.style.flexDirection = 'column';
    msgDiv.style.alignItems = 'flex-start';
    msgDiv.style.maxWidth = '90%';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    // 场景名称标记
    const tag = document.createElement('span');
    tag.className = 'intent-tag';
    tag.textContent = labels[scenarioId] || scenarioId;
    bubble.appendChild(tag);

    // KPI 卡片
    const kpiMetrics = (data.metrics || []).filter(m => m.chart_type === 'kpi_card' && m.value != null).slice(0, 8);
    if (kpiMetrics.length > 0) {
      const cards = document.createElement('div');
      cards.className = 'metric-cards';
      kpiMetrics.forEach(m => {
        const card = document.createElement('div');
        card.className = 'metric-card';
        card.innerHTML = `<div class="val">${formatValue(m.value, m.unit)}</div><div class="lbl">${m.name}</div>`;
        cards.appendChild(card);
      });
      bubble.appendChild(cards);
    }

    // 叙事文案（Markdown 转 HTML）
    if (data.narrative) {
      const narrative = document.createElement('div');
      narrative.style.cssText = 'margin-top:12px;padding:12px;background:#fff;border-radius:8px;font-size:13px;line-height:1.8;';
      narrative.innerHTML = data.narrative
        .replace(/^### (.*$)/gm, '<h4 style="margin:8px 0 4px;color:#0984e3;">$1</h4>')
        .replace(/^## (.*$)/gm, '<h3 style="margin:10px 0 6px;color:#2d3436;">$1</h3>')
        .replace(/^# (.*$)/gm, '<h2 style="margin:12px 0 8px;color:#2d3436;">$1</h2>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/^- (.*$)/gm, '<li>$1</li>')
        .replace(/\|(.+)\|/g, (match) => {
          return '<tr>' + match.split('|').filter(s => s.trim()).map(s => `<td style="padding:4px 8px;border:1px solid #ddd;">${s.trim()}</td>`).join('') + '</tr>';
        })
        .replace(/\n\n/g, '<br><br>');
      bubble.appendChild(narrative);
    }

    // 洞察
    if (data.insights && data.insights.length > 0) {
      const box = document.createElement('div');
      box.className = 'insight-box';
      box.innerHTML = '💡 ' + data.insights.join('<br>');
      bubble.appendChild(box);
    }

    msgDiv.appendChild(bubble);
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
  } catch (e) {
    addMessage('assistant', `❌ 场景生成失败: ${e.message}`);
  } finally {
    setLoading(false);
  }
}

// ── 模板保存/加载 ──
async function saveTemplate(metricIds) {
  const name = prompt('请输入模板名称：', `${state.teacherName}的模板`);
  if (!name) return;

  try {
    const res = await fetch('/api/templates/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        teacher_id: state.teacherId,
        name: name,
        metric_ids: metricIds || state.lastMetricIds,
      }),
    });
    const data = await res.json();
    if (res.ok) {
      addMessage('assistant', `✅ ${data.message}`);
    } else {
      addMessage('assistant', `❌ 保存失败: ${data.detail}`);
    }
  } catch (e) {
    addMessage('assistant', `❌ 保存失败: ${e.message}`);
  }
}

async function toggleTemplates() {
  const panel = document.getElementById('templates-panel');
  if (panel.style.display === 'none' || !panel.style.display) {
    panel.style.display = 'block';
    await loadTemplateList();
  } else {
    panel.style.display = 'none';
  }
}

async function loadTemplateList() {
  const list = document.getElementById('templates-list');
  if (!state.teacherId) { list.innerHTML = '请先选择教师'; return; }

  try {
    const res = await fetch(`/api/templates/${state.teacherId}`);
    const data = await res.json();
    if (data.templates.length === 0) {
      list.innerHTML = '<span style="color:#b2bec3;">还没有保存的模板</span>';
      return;
    }
    list.innerHTML = data.templates.map(t => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f0f0f0;">
        <span style="cursor:pointer;color:#0984e3;" onclick="loadTemplate('${t.id}', '${t.name}', ${JSON.stringify(t.metric_ids)}, '${t.time_range_start}', '${t.time_range_end}')">
          📌 ${t.name} <span style="color:#b2bec3;font-size:11px;">(${t.metric_count}个指标)</span>
        </span>
        <span style="cursor:pointer;color:#e17055;font-size:11px;" onclick="deleteTemplate(${t.id})">删除</span>
      </div>
    `).join('');
  } catch (e) {
    list.innerHTML = '加载失败';
  }
}

async function loadTemplate(id, name, metricIds, start, end) {
  state.lastMetricIds = metricIds;
  document.getElementById('templates-panel').style.display = 'none';

  try {
    const res = await fetch(`/api/teacher/${state.teacherId}/overview?metric_ids=${metricIds.join(',')}&start_date=${start}&end_date=${end}`);
    const data = await res.json();

    // 构建 ChatResponse 格式的数据
    const chatData = {
      reply: `📌 模板「${name}」：${metricIds.length} 个指标`,
      intent: 'template',
      is_followup: false,
      metrics: data.metrics,
      insights: [],
      teacher: data.teacher,
      metric_ids: metricIds,
    };
    renderAssistantReply(chatData);
  } catch (e) {
    addMessage('assistant', `❌ 加载失败: ${e.message}`);
  }
}

async function deleteTemplate(id) {
  if (!confirm('确定删除此模板？')) return;
  try {
    await fetch(`/api/templates/${id}`, { method: 'DELETE' });
    loadTemplateList();
  } catch (e) {
    addMessage('assistant', `❌ 删除失败: ${e.message}`);
  }
}

// ── v0.4: 指标自动发现 ──
function promptDiscover() {
  if (!state.teacherId) { alert('请先选择教师'); return; }
  const q = prompt('请输入你想探索的问题（如"论文被引次数分布"）：', '');
  if (!q) return;
  discoverMetric(q);
}

async function discoverMetric(question) {
  if (!state.teacherId || state.isLoading) return;
  setLoading(true);
  addMessage('user', `🔍 ${question}`);

  try {
    const res = await fetch('/api/chat/discover', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, teacher_id: state.teacherId }),
    });
    const data = await res.json();

    if (!res.ok) {
      addMessage('assistant', `❌ ${data.detail || '探索失败'}`);
      return;
    }

    const container = document.getElementById('chat-container');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'message assistant';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.style.maxWidth = '90%';

    let html = `
      <div style="font-weight:600;margin-bottom:4px;">🔍 ${data.name}</div>
      <div style="font-size:12px;color:#636e72;margin-bottom:8px;">${data.explanation || ''}</div>
      ${data.error ? `<div style="color:#e17055;font-size:12px;">⚠ ${data.error}</div>` : ''}
      ${data.sql ? `<div style="background:#f5f6fa;padding:8px;border-radius:6px;font-size:11px;font-family:monospace;margin-bottom:8px;word-break:break-all;">${data.sql}</div>` : ''}
    `;

    if (data.row_count > 0 && data.rows.length > 0) {
      html += `<div style="font-size:12px;color:#636e72;">共 ${data.row_count} 行</div>
        <div style="max-height:200px;overflow-y:auto;font-size:11px;margin-top:4px;">
          <table style="width:100%;border-collapse:collapse;">
            <thead><tr>${Object.keys(data.rows[0]).map(k => `<th style="padding:4px 6px;border-bottom:1px solid #e0e3eb;text-align:left;">${k}</th>`).join('')}</tr></thead>
            <tbody>${data.rows.slice(0, 10).map(r => `<tr>${Object.values(r).map(v => `<td style="padding:3px 6px;">${v == null ? '-' : v}</td>`).join('')}</tr>`).join('')}</tbody>
          </table>
          ${data.row_count > 10 ? '<div style="text-align:center;color:#b2bec3;padding:4px;">... 仅显示前 10 行</div>' : ''}
        </div>`;
    } else if (!data.error) {
      html += '<div style="color:#b2bec3;font-size:12px;">无数据</div>';
    }

    bubble.innerHTML = html;
    msgDiv.appendChild(bubble);
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
  } catch (e) {
    addMessage('assistant', `❌ 探索失败: ${e.message}`);
  } finally {
    setLoading(false);
  }
}

function onKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ── 渲染助手回复 ──
function renderAssistantReply(data) {
  const container = document.getElementById('chat-container');

  // v0.4: 存储指标ID供模板保存
  if (data.metric_ids && data.metric_ids.length > 0) {
    state.lastMetricIds = data.metric_ids;
  }

  // 创建消息容器
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message assistant';
  msgDiv.style.flexDirection = 'column';
  msgDiv.style.alignItems = 'flex-start';

  // 气泡
  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  // 意图标签
  if (data.intent) {
    const tag = document.createElement('span');
    tag.className = 'intent-tag';
    tag.textContent = intentLabel(data.intent) + (data.is_followup ? ' ↺ 追问' : '');
    bubble.appendChild(tag);
    bubble.appendChild(document.createElement('br'));
  }

  // 文本回复
  const textSpan = document.createElement('span');
  textSpan.textContent = data.reply;
  bubble.appendChild(textSpan);

  // KPI 小卡片（取前 6 个 KPI）
  const kpiMetrics = (data.metrics || []).filter(m => m.chart_type === 'kpi_card' && m.value != null).slice(0, 6);
  if (kpiMetrics.length > 0) {
    const cards = document.createElement('div');
    cards.className = 'metric-cards';
    kpiMetrics.forEach(m => {
      const card = document.createElement('div');
      card.className = 'metric-card';
      card.innerHTML = `<div class="val">${formatValue(m.value, m.unit)}</div><div class="lbl">${m.name}</div>`;
      cards.appendChild(card);
    });
    bubble.appendChild(cards);
  }

  // 洞察
  if (data.insights && data.insights.length > 0) {
    const box = document.createElement('div');
    box.className = 'insight-box';
    box.innerHTML = '💡 ' + data.insights.join('<br>');
    bubble.appendChild(box);
  }

  // v0.4: 保存模板按钮
  if (data.metric_ids && data.metric_ids.length > 0) {
    const saveBtn = document.createElement('button');
    saveBtn.className = 'quick-btn';
    saveBtn.textContent = '💾 保存为模板';
    saveBtn.style.cssText = 'margin-top:8px;font-size:11px;';
    saveBtn.onclick = () => saveTemplate(data.metric_ids);
    bubble.appendChild(saveBtn);

    // v1.0: 生成大屏按钮
    const dashBtn = document.createElement('button');
    dashBtn.className = 'quick-btn';
    dashBtn.textContent = '📊 生成大屏报告';
    dashBtn.style.cssText = 'margin-top:8px;margin-left:6px;font-size:11px;background:#e8f5e9;color:#2e7d32;border-color:#c8e6c9;';
    dashBtn.onclick = () => openDashboard(data.metric_ids || []);
    bubble.appendChild(dashBtn);
  }

  // 追问提示
  if (!data.is_followup) {
    const hint = document.createElement('div');
    hint.className = 'followup-hint';
    hint.textContent = '💬 可以继续追问：论文情况？经费详情？年度总结？';
    bubble.appendChild(hint);
  }

  msgDiv.appendChild(bubble);
  container.appendChild(msgDiv);
  container.scrollTop = container.scrollHeight;
}

// ── 添加简单消息 ──
function addMessage(role, text) {
  const container = document.getElementById('chat-container');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `
    <div class="avatar">${role === 'user' ? '🧑' : '🤖'}</div>
    <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function setLoading(loading) {
  state.isLoading = loading;
  document.getElementById('send-btn').disabled = loading;
  if (loading) {
    const container = document.getElementById('chat-container');
    const typing = document.createElement('div');
    typing.className = 'message assistant';
    typing.id = 'typing-indicator';
    typing.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble">
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>
    `;
    container.appendChild(typing);
    container.scrollTop = container.scrollHeight;
  } else {
    const typing = document.getElementById('typing-indicator');
    if (typing) typing.remove();
  }
}

// ── 工具函数 ──
function formatValue(val, unit) {
  if (val == null) return '-';
  if (unit === '元' && Math.abs(val) >= 10000) {
    return (val / 10000).toFixed(1) + '万';
  }
  if (Number.isInteger(val)) return val.toString();
  return Number(val).toFixed(2);
}

function intentLabel(intent) {
  const map = {
    personal_overview: '科研全景',
    funding_detail: '经费详情',
    paper_analysis: '论文分析',
    patent_analysis: '专利分析',
    award_query: '获奖查询',
    project_query: '项目查询',
    book_analysis: '著作分析',
    software_analysis: '软著分析',
    conference_analysis: '学术活动',
    annual_summary: '年度总结',
    title_evaluation: '职称评审',
  };
  return map[intent] || intent;
}

// ── 自动调整输入框高度 ──
document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// 启动
init();
</script>
