<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教师科研助手 — 智能对话</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --bg: #f8f6f4;
    --surface: #ffffff;
    --text: #1a1a2e;
    --text-light: #6b6b80;
    --text-muted: #a0a0b0;
    --primary: #6366f1;
    --primary-rgb: 99,102,241;
    --primary-light: rgba(99,102,241,0.08);
    --border: rgba(0,0,0,0.08);
    --user-bubble: #6366f1;
    --bot-bubble: #ffffff;
    --success: #10b981;
    --warning: #f59e0b;
    --error: #f43f5e;
    --shadow: 0 4px 24px rgba(0,0,0,0.06);
    --shadow-lg: 0 12px 48px rgba(0,0,0,0.08);
    --ease-out: cubic-bezier(0.16,1,0.3,1);
    --ease-bounce: cubic-bezier(0.34,1.56,0.64,1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(167,139,250,0.08) 0%, transparent 50%),
      radial-gradient(ellipse 60% 40% at 85% 50%, rgba(251,191,146,0.06) 0%, transparent 40%);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── 顶部导航 ── */
  .header {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px) saturate(150%);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 10;
  }
  .header-left {
    display: flex; align-items: center; gap: 10px;
  }
  .header .logo {
    width: 32px; height: 32px;
    background: var(--primary);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    box-shadow: 0 4px 12px rgba(var(--primary-rgb),0.25);
  }
  .header .title { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }

  /* 用户下拉菜单 */
  .user-menu {
    position: relative;
  }
  .user-trigger {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px 6px 6px;
    border-radius: 50px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .user-trigger:hover { background: rgba(0,0,0,0.04); }
  .user-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a78bfa, #6366f1);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
  }
  .user-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .user-menu-body {
    position: absolute; top: 48px; right: 0;
    background: #fff; border-radius: 14px;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border);
    min-width: 160px;
    padding: 6px;
    display: none;
    opacity: 0; transform: translateY(-6px);
    transition: all 0.2s var(--ease-out);
  }
  .user-menu.open .user-menu-body { display: block; opacity: 1; transform: translateY(0); }
  .user-menu-item {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 13px; color: var(--text-light);
    cursor: pointer;
    transition: all 0.15s;
  }
  .user-menu-item:hover { background: rgba(0,0,0,0.03); color: var(--text); }
  .user-menu-item.danger { color: var(--error); }
  .user-menu-item.danger:hover { background: rgba(244,63,94,0.06); }
  .user-menu-divider { height: 1px; background: var(--border); margin: 6px 0; }

  /* ── 主内容区 ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* ── 聊天区 ── */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px 160px;
    scroll-behavior: smooth;
  }
  .chat-inner {
    max-width: 800px;
    margin: 0 auto;
  }

  /* 空状态 / 欢迎页 */
  .welcome {
    text-align: center;
    padding: 80px 20px 40px;
    animation: fadeUp 0.5s var(--ease-out);
  }
  .welcome-icon {
    width: 64px; height: 64px;
    margin: 0 auto 20px;
    background: rgba(255,255,255,0.8);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow);
  }
  .welcome h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .welcome p { color: var(--text-light); font-size: 14px; margin-bottom: 32px; }
  .suggestion-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
    max-width: 680px;
    margin: 0 auto;
  }
  .suggestion-card {
    background: rgba(255,255,255,0.7);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s var(--ease-out);
  }
  .suggestion-card:hover {
    background: #fff;
    transform: translateY(-2px);
    box-shadow: var(--shadow);
    border-color: rgba(var(--primary-rgb),0.15);
  }
  .suggestion-card .icon { color: var(--primary); margin-bottom: 8px; }
  .suggestion-card .title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .suggestion-card .desc { font-size: 12px; color: var(--text-light); }

  /* 消息气泡 */
  .message { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; animation: fadeUp 0.4s var(--ease-out) forwards; }
  .message.user { justify-content: flex-end; flex-direction: row-reverse; }
  .message.assistant { justify-content: flex-start; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600;
  }
  .message.user .avatar { background: var(--primary); color: #fff; }
  .message.assistant .avatar { background: rgba(255,255,255,0.9); border: 1px solid var(--border); color: var(--primary); }
  .bubble {
    max-width: 640px;
    padding: 14px 18px;
    border-radius: 20px;
    font-size: 14px;
    line-height: 1.65;
    position: relative;
  }
  .message.user .bubble {
    background: var(--user-bubble);
    color: #fff;
    border-bottom-right-radius: 6px;
    box-shadow: 0 4px 16px rgba(var(--primary-rgb),0.2);
  }
  .message.assistant .bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 6px;
    box-shadow: var(--shadow);
  }

  /* 意图标签 */
  .intent-tag {
    display: inline-block;
    font-size: 10px;
    background: rgba(var(--primary-rgb),0.08);
    color: var(--primary);
    padding: 3px 10px;
    border-radius: 50px;
    margin-bottom: 8px;
    font-weight: 500;
  }

  /* KPI 小卡片 */
  .metric-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top: 12px; }
  .metric-card {
    background: rgba(99,102,241,0.04);
    border: 1px solid rgba(99,102,241,0.08);
    border-radius: 14px;
    padding: 12px 10px;
    text-align: center;
    transition: all 0.3s var(--ease-out);
  }
  .metric-card:hover { transform: translateY(-2px); background: rgba(99,102,241,0.06); }
  .metric-card .val { font-size: 18px; font-weight: 700; color: var(--primary); }
  .metric-card .lbl { font-size: 10px; color: var(--text-light); margin-top: 2px; }

  /* 洞察 */
  .insight-box {
    margin-top: 10px;
    padding: 12px 16px;
    background: rgba(245,158,11,0.06);
    border: 1px solid rgba(245,158,11,0.12);
    border-radius: 14px;
    font-size: 12px;
    color: #92400e;
  }

  /* 追问提示 */
  .followup-hint {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* 消息内操作按钮 */
  .msg-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .msg-btn {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 50px;
    background: rgba(255,255,255,0.7);
    color: var(--text-light);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .msg-btn:hover { background: #fff; border-color: rgba(var(--primary-rgb),0.2); color: var(--primary); }
  .msg-btn.primary { background: rgba(var(--primary-rgb),0.08); color: var(--primary); border-color: rgba(var(--primary-rgb),0.15); }
  .msg-btn.success { background: rgba(16,185,129,0.08); color: var(--success); border-color: rgba(16,185,129,0.15); }

  /* ── 快捷按钮 / chips ── */
  .quick-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 8px 0;
    max-width: 760px;
    margin: 0 auto;
  }
  .quick-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 50px;
    background: rgba(255,255,255,0.7);
    color: var(--text-light);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .quick-chip:hover { background: #fff; border-color: rgba(var(--primary-rgb),0.2); color: var(--primary); transform: translateY(-1px); }
  .quick-chip svg { width: 13px; height: 13px; }

  /* ── 加载动画 ── */
  .loading-dots { display: flex; gap: 5px; padding: 8px 0; }
  .loading-dots span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--primary);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── 表格 ── */
  table { border-collapse: collapse; width: 100%; font-size: 11px; }
  th, td { padding: 5px 8px; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.04); }
  th { color: var(--text-light); font-weight: 500; font-size: 10px; text-transform: uppercase; letter-spacing: 0.03em; }
  tr:nth-child(even) td { background: rgba(0,0,0,0.01); }
  tr:hover td { background: rgba(var(--primary-rgb),0.03); }

  /* ── 输入区（底部固定居中） ── */
  .input-wrapper {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(248,246,244,0.92);
    backdrop-filter: blur(12px);
    padding: 0 20px 24px;
    z-index: 20;
  }
  .input-area {
    max-width: 800px;
    margin: 0 auto;
  }
  .input-box {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 12px 14px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    box-shadow: var(--shadow-lg);
    transition: all 0.2s;
  }
  .input-box:focus-within {
    border-color: rgba(var(--primary-rgb),0.25);
    box-shadow: 0 12px 48px rgba(99,102,241,0.12);
  }
  .input-box textarea {
    flex: 1;
    border: none;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    height: 26px;
    max-height: 140px;
    outline: none;
    background: transparent;
    padding: 6px 4px;
    line-height: 1.5;
  }
  .input-box textarea::placeholder { color: var(--text-muted); }
  .send-btn {
    width: 36px; height: 36px;
    border: none;
    border-radius: 50%;
    background: var(--primary);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s var(--ease-bounce);
    box-shadow: 0 4px 12px rgba(var(--primary-rgb),0.25);
    flex-shrink: 0;
  }
  .send-btn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 6px 18px rgba(var(--primary-rgb),0.35); }
  .send-btn:active:not(:disabled) { transform: scale(0.95); }
  .send-btn:disabled { background: var(--text-muted); cursor: not-allowed; box-shadow: none; }
  .input-hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
  }

  /* 模板面板 */
  .templates-popover {
    position: absolute;
    bottom: 76px;
    left: 50%; transform: translateX(-50%);
    width: 90%; max-width: 760px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    box-shadow: var(--shadow-lg);
    display: none;
    max-height: 260px;
    overflow-y: auto;
  }
  .templates-popover.open { display: block; }

  /* ── 登录遮罩 ── */
  .login-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .login-card {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(24px);
    border-radius: 24px;
    padding: 40px;
    width: 380px;
    text-align: center;
    box-shadow: var(--shadow-lg);
  }
  .login-card h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 8px; }
  .login-card p { font-size: 13px; color: var(--text-light); margin-bottom: 24px; }
  .login-card input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 14px;
    margin-bottom: 12px;
    background: rgba(255,255,255,0.7);
    transition: all 0.2s;
  }
  .login-card input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(var(--primary-rgb),0.08);
  }
  .login-card button {
    width: 100%;
    border: none;
    background: var(--primary);
    color: #fff;
    border-radius: 50px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s var(--ease-bounce);
    box-shadow: 0 4px 16px rgba(var(--primary-rgb),0.3);
  }
  .login-card button:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(var(--primary-rgb),0.4); }
  #login-error { color: var(--error); font-size: 13px; margin-top: 10px; display: none; }
</style>
</head>

<body>

<!-- 登录遮罩 -->
<div class="login-overlay" id="login-overlay">
  <div class="login-card">
    <h2><i data-lucide="school" style="width:26px;height:26px;vertical-align:-5px;margin-right:6px;"></i>教师登录</h2>
    <p>输入工号和密码开始对话（初始密码为工号后6位）</p>
    <input type="text" id="login-teacher-id" placeholder="工号">
    <input type="password" id="login-password" placeholder="密码">
    <button onclick="doLogin()">登录</button>
    <div id="login-error">请填写工号和密码</div>
  </div>
</div>

<div class="header">
  <div class="header-left">
    <div class="logo"><i data-lucide="graduation-cap" style="width:18px;height:18px;"></i></div>
    <span class="title">教师科研助手</span>
  </div>

  <div class="user-menu" id="user-menu">
    <div class="user-trigger" onclick="toggleUserMenu()">
      <div class="user-avatar" id="user-avatar">用</div>
      <span class="user-name" id="user-name">未登录</span>
      <i data-lucide="chevron-down" style="width:14px;height:14px;color:var(--text-light);"></i>
    </div>
    <div class="user-menu-body">
      <div class="user-menu-item" onclick="openAdmin()">
        <i data-lucide="layout-dashboard" style="width:14px;height:14px;"></i>
        <span>超管后台</span>
      </div>
      <div class="user-menu-divider"></div>
      <div class="user-menu-item danger" onclick="logout()">
        <i data-lucide="log-out" style="width:14px;height:14px;"></i>
        <span>退出登录</span>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div class="chat-container" id="chat-container">
    <div class="chat-inner" id="chat-inner">
      <!-- 消息动态插入 -->
    </div>
  </div>

  <!-- 快捷功能 chips（位于输入框上方） -->
  <div class="quick-chips" id="quick-chips">
    <button class="quick-chip" onclick="sendQuick('帮我看看整体科研情况')">
      <i data-lucide="layout-dashboard" style="width:13px;height:13px;"></i>科研全景
    </button>
    <button class="quick-chip" onclick="sendQuick('论文发表情况')">
      <i data-lucide="file-text" style="width:13px;height:13px;"></i>论文分析
    </button>
    <button class="quick-chip" onclick="sendQuick('经费到账和支出详情')">
      <i data-lucide="banknote" style="width:13px;height:13px;"></i>经费详情
    </button>
    <button class="quick-chip" onclick="promptDiscover()">
      <i data-lucide="compass" style="width:13px;height:13px;"></i>探索新指标
    </button>
    <button class="quick-chip" onclick="runScenario('annual_summary')">
      <i data-lucide="calendar-days" style="width:13px;height:13px;"></i>年度总结
    </button>
    <button class="quick-chip" onclick="runScenario('title_evaluation')">
      <i data-lucide="award" style="width:13px;height:13px;"></i>职称评审
    </button>
    <button class="quick-chip" onclick="runScenario('grant_application')">
      <i data-lucide="landmark" style="width:13px;height:13px;"></i>基金申报
    </button>
    <button class="quick-chip" onclick="toggleTemplates()">
      <i data-lucide="bookmark" style="width:13px;height:13px;"></i>我的模板
    </button>
  </div>

  <!-- 模板面板 -->
  <div class="templates-popover" id="templates-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <span style="font-size:13px;font-weight:600;"><i data-lucide="bookmark" style="width:14px;height:14px;vertical-align:-2px;margin-right:4px;"></i>我的模板</span>
      <span onclick="toggleTemplates()" style="cursor:pointer;color:var(--text-light);"><i data-lucide="x" style="width:14px;height:14px;"></i></span>
    </div>
    <div id="templates-list" style="font-size:13px;color:var(--text-light);">加载中...</div>
  </div>

  <!-- 输入区 -->
  <div class="input-wrapper">
    <div class="input-area">
      <div class="input-box">
        <textarea id="user-input" rows="1" placeholder="输入问题，如「帮我看看整体科研情况」..." onkeydown="onKeyDown(event)"></textarea>
        <button id="send-btn" class="send-btn" onclick="sendMessage()" disabled>
          <i data-lucide="arrow-up" style="width:18px;height:18px;"></i>
        </button>
      </div>
      <div class="input-hint">按 Enter 发送，Shift + Enter 换行</div>
    </div>
  </div>
</div>

<script>
// ── 全局状态 ──
let state = {
  sessionId: null,
  teacherId: null,
  teacherName: '',
  isLoading: false,
  lastMetricIds: [],
  token: null,
};

// ── 初始化（恢复登录态） ──
async function init() {
  const saved = localStorage.getItem('tr_token');
  if (saved) {
    try {
      const res = await fetch('/api/auth/me', {
        headers: { 'Authorization': `Bearer ${saved}` }
      });
      if (res.ok) {
        const user = await res.json();
        state.token = saved;
        state.teacherId = user.teacher_id;
        state.teacherName = user.name;
        document.getElementById('login-overlay').style.display = 'none';
        updateUserHeader(user.name, user.department);
        document.getElementById('send-btn').disabled = false;
        showWelcome(user.name);
        return;
      }
    } catch(e) { localStorage.removeItem('tr_token'); }
  }

  // 检查服务是否可用
  try {
    const res = await fetch('/api/chat/sessions');
    if (!res.ok) throw new Error('服务未启动');
  } catch (e) {
    document.getElementById('chat-inner').innerHTML =
      '<div style="text-align:center;padding:60px 20px;color:var(--error);"><i data-lucide="alert-circle" style="width:32px;height:32px;margin-bottom:10px;"></i><br>服务未启动，请先运行 <code>python main.py</code></div>';
    lucide.createIcons();
  }
}

function updateUserHeader(name, department) {
  document.getElementById('user-name').textContent = name || '教师';
  document.getElementById('user-avatar').textContent = (name || '用').charAt(0);
  document.getElementById('user-avatar').dataset.department = department || '';
}

function showWelcome(name) {
  const inner = document.getElementById('chat-inner');
  inner.innerHTML = `
    <div class="welcome">
      <div class="welcome-icon"><i data-lucide="sparkles" style="width:28px;height:28px;color:var(--primary);"></i></div>
      <h1>你好，${name}老师</h1>
      <p>我是你的科研助手，可以帮你分析科研数据、生成报告和洞察。</p>
      <div class="suggestion-grid">
        <div class="suggestion-card" onclick="sendQuick('帮我看看整体科研情况')">
          <div class="icon"><i data-lucide="layout-dashboard" style="width:18px;height:18px;"></i></div>
          <div class="title">科研全景</div>
          <div class="desc">查看个人科研整体情况与核心指标</div>
        </div>
        <div class="suggestion-card" onclick="sendQuick('论文发表情况')">
          <div class="icon"><i data-lucide="file-text" style="width:18px;height:18px;"></i></div>
          <div class="title">论文分析</div>
          <div class="desc">论文数量、级别、趋势与作者角色</div>
        </div>
        <div class="suggestion-card" onclick="sendQuick('经费到账和支出详情')">
          <div class="icon"><i data-lucide="banknote" style="width:18px;height:18px;"></i></div>
          <div class="title">经费详情</div>
          <div class="desc">到账、支出、执行率与月度趋势</div>
        </div>
        <div class="suggestion-card" onclick="runScenario('annual_summary')">
          <div class="icon"><i data-lucide="calendar-days" style="width:18px;height:18px;"></i></div>
          <div class="title">年度总结</div>
          <div class="desc">一键生成年度科研总结报告</div>
        </div>
      </div>
    </div>
  `;
  lucide.createIcons();
}

// ── 用户菜单 ──
function toggleUserMenu() {
  document.getElementById('user-menu').classList.toggle('open');
}

document.addEventListener('click', function(e) {
  const menu = document.getElementById('user-menu');
  if (!menu.contains(e.target)) menu.classList.remove('open');
});

function openAdmin() {
  window.open('/api/admin', '_blank');
}

function logout() {
  state.token = null;
  state.teacherId = null;
  state.teacherName = '';
  localStorage.removeItem('tr_token');
  location.reload();
}

// ── 登录 ──
async function doLogin() {
  const teacherId = document.getElementById('login-teacher-id').value.trim();
  const password = document.getElementById('login-password').value;
  const errDiv = document.getElementById('login-error');
  if (!teacherId || !password) { errDiv.style.display = 'block'; return; }
  errDiv.style.display = 'none';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ teacher_id: teacherId, password: password }),
    });
    const data = await res.json();
    if (!res.ok) {
      errDiv.textContent = data.detail || '登录失败';
      errDiv.style.display = 'block';
      return;
    }

    state.token = data.token;
    state.teacherId = data.user.teacher_id;
    state.teacherName = data.user.name;
    localStorage.setItem('tr_token', data.token);

    document.getElementById('login-overlay').style.display = 'none';
    updateUserHeader(data.user.name, data.user.department);
    document.getElementById('send-btn').disabled = false;
    showWelcome(data.user.name);
  } catch (e) {
    errDiv.textContent = '网络错误：' + e.message;
    errDiv.style.display = 'block';
  }
}

// v1.0: 生成大屏报告
function openDashboard(metricIds) {
  if (!state.teacherId) return;
  const mids = (metricIds.length > 0 ? metricIds : state.lastMetricIds).join(',');
  const url = `/api/teacher/${state.teacherId}/report?metric_ids=${mids}`;
  window.open(url, '_blank');
}

// v1.0: 导出按钮
async function exportReport(format) {
  if (!state.teacherId) { alert('请先登录'); return; }
  try {
    const res = await fetch('/api/export', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ teacher_id: state.teacherId, format: format, scenario_id: 'annual_summary' }),
    });
    if (!res.ok) { alert('导出失败'); return; }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = format === 'pptx' ? '科研报告.pptx' : '科研报告.md';
    a.click();
    URL.revokeObjectURL(url);
  } catch (e) { alert('导出失败: ' + e.message); }
}

// ── 发送消息 ──
async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || state.isLoading) return;

  // 首次发送时隐藏欢迎页
  const welcome = document.querySelector('.welcome');
  if (welcome) welcome.remove();

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  setLoading(true);

  try {
    const body = { message: text };
    if (state.sessionId) body.session_id = state.sessionId;
    if (state.teacherId) body.teacher_id = state.teacherId;

    const res = await fetch('/api/chat/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || '请求失败');
    }

    const data = await res.json();
    state.sessionId = data.session_id;

    // 渲染回复
    renderAssistantReply(data);
  } catch (e) {
    addMessage('assistant', `<span style="color:var(--error)">${e.message}</span>`);
  } finally {
    setLoading(false);
  }
}

function sendQuick(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

// ── 场景模板一键生成 ──
async function runScenario(scenarioId) {
  if (!state.teacherId || state.isLoading) return;
  setLoading(true);

  const labels = {
    annual_summary: '年度科研总结',
    title_evaluation: '职称评审材料',
    grant_application: '基金申报支撑',
  };

  try {
    const res = await fetch('/api/chat/scenario', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ scenario_id: scenarioId, teacher_id: state.teacherId }),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || '生成失败');
    }

    const data = await res.json();

    // 隐藏欢迎页
    const welcome = document.querySelector('.welcome');
    if (welcome) welcome.remove();

    const container = document.getElementById('chat-inner');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'message assistant';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    const tag = document.createElement('span');
    tag.className = 'intent-tag';
    tag.textContent = labels[scenarioId] || scenarioId;
    bubble.appendChild(tag);
    bubble.appendChild(document.createElement('br'));

    const kpiMetrics = (data.metrics || []).filter(m => m.chart_type === 'kpi_card' && m.value != null).slice(0, 8);
    if (kpiMetrics.length > 0) {
      const cards = document.createElement('div');
      cards.className = 'metric-cards';
      kpiMetrics.forEach(m => {
        const card = document.createElement('div');
        card.className = 'metric-card';
        card.innerHTML = `<div class="val">${formatValue(m.value, m.unit)}</div><div class="lbl">${m.name}</div>`;
        cards.appendChild(card);
      });
      bubble.appendChild(cards);
    }

    if (data.narrative) {
      const narrative = document.createElement('div');
      narrative.style.cssText = 'margin-top:12px;padding:12px;background:#fafafa;border-radius:12px;font-size:13px;line-height:1.8;';
      narrative.innerHTML = data.narrative
        .replace(/^### (.*$)/gm, '<h4 style="margin:8px 0 4px;color:var(--primary);">$1</h4>')
        .replace(/^## (.*$)/gm, '<h3 style="margin:10px 0 6px;color:var(--text);">$1</h3>')
        .replace(/^# (.*$)/gm, '<h2 style="margin:12px 0 8px;color:var(--text);">$1</h2>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/^- (.*$)/gm, '<li>$1</li>')
        .replace(/\|(.+)\|/g, (match) => '<tr>' + match.split('|').filter(s => s.trim()).map(s => `<td style="padding:4px 8px;border:1px solid #eee;">${s.trim()}</td>`).join('') + '</tr>')
        .replace(/\n\n/g, '<br><br>');
      bubble.appendChild(narrative);
    }

    if (data.insights && data.insights.length > 0) {
      const box = document.createElement('div');
      box.className = 'insight-box';
      box.innerHTML = '<i data-lucide="lightbulb" style="width:14px;height:14px;vertical-align:-2px;margin-right:4px;"></i>' + data.insights.join('<br>');
      bubble.appendChild(box);
    }

    appendMsgActions(bubble, data.metric_ids || []);

    msgDiv.appendChild(bubble);
    container.appendChild(msgDiv);
    scrollToBottom();
    lucide.createIcons();
  } catch (e) {
    addMessage('assistant', `<span style="color:var(--error)">场景生成失败: ${e.message}</span>`);
  } finally {
    setLoading(false);
  }
}

// ── 模板保存/加载 ──
async function saveTemplate(metricIds) {
  const name = prompt('请输入模板名称：', `${state.teacherName}的模板`);
  if (!name) return;

  try {
    const res = await fetch('/api/templates/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        teacher_id: state.teacherId,
        name: name,
        metric_ids: metricIds || state.lastMetricIds,
      }),
    });
    const data = await res.json();
    if (res.ok) {
      addMessage('assistant', `<span style="color:var(--success)">${data.message}</span>`);
    } else {
      addMessage('assistant', `<span style="color:var(--error)">保存失败: ${data.detail}</span>`);
    }
  } catch (e) {
    addMessage('assistant', `<span style="color:var(--error)">保存失败: ${e.message}</span>`);
  }
}

async function toggleTemplates() {
  const panel = document.getElementById('templates-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    await loadTemplateList();
  }
}

async function loadTemplateList() {
  const list = document.getElementById('templates-list');
  if (!state.teacherId) { list.innerHTML = '请先登录'; return; }

  try {
    const res = await fetch(`/api/templates/${state.teacherId}`);
    const data = await res.json();
    if (data.templates.length === 0) {
      list.innerHTML = '<span style="color:var(--text-muted);">还没有保存的模板</span>';
      return;
    }
    list.innerHTML = data.templates.map(t => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);">
        <span style="cursor:pointer;color:var(--primary);" onclick="loadTemplate('${t.id}', '${t.name}', ${JSON.stringify(t.metric_ids)}, '${t.time_range_start}', '${t.time_range_end}')">
          <i data-lucide="bookmark" style="width:12px;height:12px;vertical-align:-1px;margin-right:4px;"></i>${t.name} <span style="color:var(--text-muted);font-size:11px;">(${t.metric_count}个指标)</span>
        </span>
        <span style="cursor:pointer;color:var(--error);font-size:11px;" onclick="deleteTemplate(${t.id})">删除</span>
      </div>
    `).join('');
    lucide.createIcons();
  } catch (e) {
    list.innerHTML = '加载失败';
  }
}

async function loadTemplate(id, name, metricIds, start, end) {
  state.lastMetricIds = metricIds;
  document.getElementById('templates-panel').classList.remove('open');

  try {
    const res = await fetch(`/api/teacher/${state.teacherId}/overview?metric_ids=${metricIds.join(',')}&start_date=${start}&end_date=${end}`);
    const data = await res.json();
    const chatData = {
      reply: `模板「${name}」：${metricIds.length} 个指标`,
      intent: 'template',
      is_followup: false,
      metrics: data.metrics,
      insights: [],
      teacher: data.teacher,
      metric_ids: metricIds,
    };
    renderAssistantReply(chatData);
  } catch (e) {
    addMessage('assistant', `<span style="color:var(--error)">加载失败: ${e.message}</span>`);
  }
}

async function deleteTemplate(id) {
  if (!confirm('确定删除此模板？')) return;
  try {
    await fetch(`/api/templates/${id}`, { method: 'DELETE' });
    loadTemplateList();
  } catch (e) {
    addMessage('assistant', `<span style="color:var(--error)">删除失败: ${e.message}</span>`);
  }
}

// ── v0.4: 指标自动发现 ──
function promptDiscover() {
  if (!state.teacherId) { alert('请先登录'); return; }
  const q = prompt('请输入你想探索的问题（如"论文被引次数分布"）：', '');
  if (!q) return;
  discoverMetric(q);
}

async function discoverMetric(question) {
  if (!state.teacherId || state.isLoading) return;
  setLoading(true);

  const welcome = document.querySelector('.welcome');
  if (welcome) welcome.remove();
  addMessage('user', `<i data-lucide="compass" style="width:14px;height:14px;vertical-align:-2px;margin-right:4px;"></i>${question}`);

  try {
    const res = await fetch('/api/chat/discover', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, teacher_id: state.teacherId }),
    });
    const data = await res.json();

    if (!res.ok) {
      addMessage('assistant', `<span style="color:var(--error)">${data.detail || '探索失败'}</span>`);
      return;
    }

    const container = document.getElementById('chat-inner');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'message assistant';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    let html = `
      <div style="font-weight:600;margin-bottom:4px;"><i data-lucide="compass" style="width:14px;height:14px;vertical-align:-2px;margin-right:4px;"></i>${data.name}</div>
      <div style="font-size:12px;color:var(--text-light);margin-bottom:8px;">${data.explanation || ''}</div>
      ${data.error ? `<div style="color:var(--error);font-size:12px;"><i data-lucide="alert-triangle" style="width:12px;height:12px;vertical-align:-1px;margin-right:3px;"></i>${data.error}</div>` : ''}
      ${data.sql ? `<div style="background:#f8f8f8;padding:8px;border-radius:8px;font-size:11px;font-family:monospace;margin-bottom:8px;word-break:break-all;">${data.sql}</div>` : ''}
    `;

    if (data.row_count > 0 && data.rows.length > 0) {
      html += `<div style="font-size:12px;color:var(--text-light);">共 ${data.row_count} 行</div>
        <div style="max-height:200px;overflow-y:auto;font-size:11px;margin-top:4px;">
          <table style="width:100%;border-collapse:collapse;">
            <thead><tr>${Object.keys(data.rows[0]).map(k => `<th style="padding:4px 6px;border-bottom:1px solid var(--border);text-align:left;">${k}</th>`).join('')}</tr></thead>
            <tbody>${data.rows.slice(0, 10).map(r => `<tr>${Object.values(r).map(v => `<td style="padding:3px 6px;">${v == null ? '-' : v}</td>`).join('')}</tr>`).join('')}</tbody>
          </table>
          ${data.row_count > 10 ? '<div style="text-align:center;color:var(--text-muted);padding:4px;">... 仅显示前 10 行</div>' : ''}
        </div>`;
    } else if (!data.error) {
      html += '<div style="color:var(--text-muted);font-size:12px;">无数据</div>';
    }

    bubble.innerHTML = html;
    msgDiv.appendChild(bubble);
    container.appendChild(msgDiv);
    scrollToBottom();
    lucide.createIcons();
  } catch (e) {
    addMessage('assistant', `<span style="color:var(--error)">探索失败: ${e.message}</span>`);
  } finally {
    setLoading(false);
  }
}

function onKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ── 渲染助手回复 ──
function renderAssistantReply(data) {
  const container = document.getElementById('chat-inner');

  if (data.metric_ids && data.metric_ids.length > 0) {
    state.lastMetricIds = data.metric_ids;
  }

  const msgDiv = document.createElement('div');
  msgDiv.className = 'message assistant';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (data.intent) {
    const tag = document.createElement('span');
    tag.className = 'intent-tag';
    tag.textContent = intentLabel(data.intent) + (data.is_followup ? ' ↺ 追问' : '');
    bubble.appendChild(tag);
    bubble.appendChild(document.createElement('br'));
  }

  const textSpan = document.createElement('span');
  textSpan.innerHTML = data.reply.replace(/\n/g, '<br>');
  bubble.appendChild(textSpan);

  const kpiMetrics = (data.metrics || []).filter(m => m.chart_type === 'kpi_card' && m.value != null).slice(0, 6);
  if (kpiMetrics.length > 0) {
    const cards = document.createElement('div');
    cards.className = 'metric-cards';
    kpiMetrics.forEach(m => {
      const card = document.createElement('div');
      card.className = 'metric-card';
      card.innerHTML = `<div class="val">${formatValue(m.value, m.unit)}</div><div class="lbl">${m.name}</div>`;
      cards.appendChild(card);
    });
    bubble.appendChild(cards);
  }

  if (data.insights && data.insights.length > 0) {
    const box = document.createElement('div');
    box.className = 'insight-box';
    box.innerHTML = '<i data-lucide="lightbulb" style="width:14px;height:14px;vertical-align:-2px;margin-right:4px;"></i>' + data.insights.join('<br>');
    bubble.appendChild(box);
  }

  appendMsgActions(bubble, data.metric_ids || []);

  msgDiv.appendChild(bubble);
  container.appendChild(msgDiv);
  scrollToBottom();
  lucide.createIcons();
}

function appendMsgActions(bubble, metricIds) {
  if (!metricIds || metricIds.length === 0) return;
  const actions = document.createElement('div');
  actions.className = 'msg-actions';
  actions.innerHTML = `
    <button class="msg-btn" onclick="saveTemplate(${JSON.stringify(metricIds)})">
      <i data-lucide="bookmark" style="width:12px;height:12px;"></i>保存为模板
    </button>
    <button class="msg-btn primary" onclick="openDashboard(${JSON.stringify(metricIds)})">
      <i data-lucide="monitor" style="width:12px;height:12px;"></i>生成大屏报告
    </button>
    <button class="msg-btn" onclick="exportReport('pptx')">
      <i data-lucide="download" style="width:12px;height:12px;"></i>导出PPT
    </button>
  `;
  bubble.appendChild(actions);
}

// ── 添加简单消息 ──
function addMessage(role, text) {
  const container = document.getElementById('chat-inner');
  const welcome = document.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `
    <div class="avatar">${role === 'user' ? '<i data-lucide="user" style="width:16px;height:16px;"></i>' : '<i data-lucide="bot" style="width:16px;height:16px;"></i>'}</div>
    <div class="bubble">${text}</div>
  `;
  container.appendChild(div);
  scrollToBottom();
  lucide.createIcons();
}

function setLoading(loading) {
  state.isLoading = loading;
  document.getElementById('send-btn').disabled = loading || !state.teacherId;
  if (loading) {
    const container = document.getElementById('chat-inner');
    const typing = document.createElement('div');
    typing.className = 'message assistant';
    typing.id = 'typing-indicator';
    typing.innerHTML = `
      <div class="avatar"><i data-lucide="bot" style="width:16px;height:16px;"></i></div>
      <div class="bubble">
        <div class="loading-dots"><span></span><span></span><span></span></div>
      </div>
    `;
    container.appendChild(typing);
    scrollToBottom();
    lucide.createIcons();
  } else {
    const typing = document.getElementById('typing-indicator');
    if (typing) typing.remove();
  }
}

function scrollToBottom() {
  const container = document.getElementById('chat-container');
  container.scrollTop = container.scrollHeight;
}

// ── 工具函数 ──
function formatValue(val, unit) {
  if (val == null) return '-';
  if (unit === '元' && Math.abs(val) >= 10000) {
    return (val / 10000).toFixed(1) + '万';
  }
  if (Number.isInteger(val)) return val.toString();
  return Number(val).toFixed(2);
}

function intentLabel(intent) {
  const map = {
    personal_overview: '科研全景',
    funding_detail: '经费详情',
    paper_analysis: '论文分析',
    patent_analysis: '专利分析',
    award_query: '获奖查询',
    project_query: '项目查询',
    book_analysis: '著作分析',
    software_analysis: '软著分析',
    conference_analysis: '学术活动',
    annual_summary: '年度总结',
    title_evaluation: '职称评审',
  };
  return map[intent] || intent;
}

// ── 自动调整输入框高度 ──
document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 140) + 'px';
});

// 启动
init();
</script>
