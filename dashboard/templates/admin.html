<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超管后台 — 教师科研查询器</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --bg: #f8f6f4;
    --text: #1a1a2e; --text-light: #6b6b80; --text-muted: #a0a0b0;
    --primary: #6366f1; --primary-rgb: 99,102,241;
    --success: #10b981; --warning: #f59e0b; --error: #f43f5e;
    --surface: rgba(255,255,255,0.6);
    --surface-border: rgba(255,255,255,0.7);
    --ease-out: cubic-bezier(0.16,1,0.3,1);
    --ease-bounce: cubic-bezier(0.34,1.56,0.64,1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Microsoft YaHei", sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(167,139,250,0.12) 0%, transparent 50%),
      radial-gradient(ellipse 60% 40% at 90% 60%, rgba(251,191,146,0.1) 0%, transparent 40%),
      radial-gradient(ellipse 50% 50% at 10% 90%, rgba(147,197,253,0.08) 0%, transparent 40%);
    color: var(--text); min-height: 100vh;
  }
  .header {
    background: rgba(255,255,255,0.7); backdrop-filter: blur(20px) saturate(150%);
    border-bottom: 1px solid rgba(255,255,255,0.7);
    padding: 14px 32px; display: flex; align-items: center; gap: 12px;
  }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .header .logout { margin-left: auto; color: var(--error); cursor: pointer; font-size: 13px; font-weight: 500; }
  .container { display: grid; grid-template-columns: 200px 1fr; min-height: calc(100vh - 53px); }
  .sidebar {
    background: rgba(255,255,255,0.5); backdrop-filter: blur(16px);
    border-right: 1px solid rgba(255,255,255,0.5); padding: 16px 0;
  }
  .sidebar a {
    display: flex; align-items: center; gap: 8px; padding: 10px 20px;
    font-size: 13px; color: var(--text-light); cursor: pointer; transition: all 0.2s; text-decoration: none;
  }
  .sidebar a:hover, .sidebar a.active {
    background: rgba(99,102,241,0.08); color: var(--primary); font-weight: 600;
    border-right: 2px solid var(--primary);
  }
  .sidebar a i { width: 16px; height: 16px; stroke-width: 1.75; }
  .main { padding: 28px; }
  .card {
    background: rgba(255,255,255,0.65); backdrop-filter: blur(20px) saturate(150%);
    border: 1px solid rgba(255,255,255,0.6); border-radius: 24px;
    padding: 28px; margin-bottom: 20px; position: relative; overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.03), inset 0 1px 0 rgba(255,255,255,0.6);
    transition: all 0.4s var(--ease-out);
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 10%; right: 10%;
    height: 1px; background: linear-gradient(90deg, transparent, rgba(99,102,241,0.15) 50%, transparent);
  }
  .card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.7); }
  .card h3 { margin-bottom: 16px; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat {
    background: rgba(255,255,255,0.7); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.6); border-radius: 20px; padding: 20px;
    text-align: center; transition: all 0.4s var(--ease-out);
  }
  .stat:hover { transform: translateY(-4px); box-shadow: 0 12px 28px rgba(0,0,0,0.08); border-color: rgba(99,102,241,0.2); }
  .stat .val { font-size: 32px; font-weight: 700; color: var(--primary); letter-spacing: -0.03em; }
  .stat .lbl { font-size: 12px; color: var(--text-light); margin-top: 4px; font-weight: 500; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.04); }
  th { color: var(--text-light); font-weight: 500; font-size: 11px; letter-spacing: 0.03em; text-transform: uppercase; }
  tr:nth-child(even) td { background: rgba(99,102,241,0.02); }
  tr:hover td { background: rgba(99,102,241,0.04); }
  button {
    background: var(--primary); color: #fff; border: none; border-radius: 50px;
    padding: 10px 24px; cursor: pointer; font-size: 13px; font-weight: 500;
    transition: all 0.25s var(--ease-bounce); box-shadow: 0 4px 16px rgba(var(--primary-rgb),0.25);
  }
  button:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 8px 24px rgba(var(--primary-rgb),0.35); }
  button:active { transform: scale(0.97); transition-duration: 0.1s; }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .status-dot.ok { background: var(--success); }
  .status-dot.err { background: var(--error); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 50px; font-size: 10px; font-weight: 500; letter-spacing: 0.03em; }
  .badge.admin { background: rgba(244,63,94,0.1); color: #f43f5e; }
  .badge.teacher { background: rgba(16,185,129,0.1); color: #10b981; }

  /* ── 分页 ── */
  .pagination { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; margin-top: 8px; border-top: 1px solid rgba(0,0,0,0.04); }
  .pagination-info { font-size: 12px; color: var(--text-light); }
  .pagination-actions { display: flex; align-items: center; gap: 6px; }
  .pagination button {
    padding: 6px 12px; font-size: 12px; border: 1px solid var(--border); border-radius: 8px;
    background: rgba(255,255,255,0.7); color: var(--text); cursor: pointer; transition: all 0.2s;
  }
  .pagination button:hover:not(:disabled) { background: #fff; border-color: rgba(var(--primary-rgb),0.3); }
  .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
  .pagination .page-numbers { display: flex; gap: 4px; }
  .pagination .page-number {
    min-width: 30px; height: 30px; padding: 0 8px; display: flex; align-items: center; justify-content: center;
    border-radius: 8px; font-size: 12px; cursor: pointer; border: 1px solid transparent;
    background: transparent; color: var(--text-light); transition: all 0.2s;
  }
  .pagination .page-number:hover { background: rgba(0,0,0,0.03); }
  .pagination .page-number.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .pagination .page-jump { display: flex; align-items: center; gap: 6px; margin-left: 8px; }
  .pagination .page-jump input { width: 44px; padding: 4px 6px; font-size: 12px; border: 1px solid var(--border); border-radius: 6px; text-align: center; }
  .login-overlay { position: fixed; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .login-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(24px); border-radius: 28px; padding: 40px; width: 360px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
  .login-card h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 24px; }
  .login-card input { width: 100%; border: 1px solid rgba(0,0,0,0.08); border-radius: 12px; padding: 12px 16px; font-size: 14px; margin-bottom: 14px; transition: all 0.2s; }
  .login-card input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(var(--primary-rgb),0.1); }
  .section { display: none; }
  .section.active { display: block; }
  select, input[type="text"], input[type="password"] {
    border: 1px solid rgba(0,0,0,0.08); border-radius: 10px; padding: 8px 12px;
    font-size: 13px; background: rgba(255,255,255,0.7); transition: all 0.2s;
  }
  select:focus, input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(var(--primary-rgb),0.08); }
  textarea { border: 1px solid rgba(0,0,0,0.08); border-radius: 12px; padding: 10px; font-family: monospace; }
  textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(var(--primary-rgb),0.08); }
  i { width: 16px; height: 16px; stroke-width: 1.75; stroke: currentColor; }
</style>
</head>
<body>

<div class="login-overlay" id="login-overlay">
  <div class="login-card">
    <h2><i data-lucide="shield-check" style="width:26px;height:26px;vertical-align:-5px;margin-right:6px;"></i>超管登录</h2>
    <input type="text" id="admin-id" placeholder="管理员账号">
    <input type="password" id="admin-pw" placeholder="密码">
    <button onclick="adminLogin()" style="width:100%;">登录</button>
    <div id="login-error" style="color:#e17055;font-size:13px;margin-top:8px;display:none;"></div>
  </div>
</div>

<div class="header">
  <h1><i data-lucide="shield-check" style="width:22px;height:22px;vertical-align:-3px;margin-right:8px;"></i>教师科研查询器 — 超管后台</h1>
  <span id="admin-name" style="font-size:13px;color:var(--text-light);"></span>
  <span class="logout" onclick="logout()">退出</span>
</div>

<div class="container">
  <div class="sidebar">
    <a class="active" onclick="showSection('dashboard', this)"><i data-lucide="layout-dashboard"></i> 仪表盘</a>
    <a onclick="showSection('users', this)"><i data-lucide="users"></i> 用户管理</a>
    <a onclick="showSection('datasource', this)"><i data-lucide="database"></i> 数据源</a>
    <a onclick="showSection('metrics', this)"><i data-lucide="bar-chart-2"></i> 指标管理</a>
    <a onclick="showSection('logs', this)"><i data-lucide="scroll-text"></i> 系统日志</a>
    <a onclick="showSection('sync', this)"><i data-lucide="refresh-cw"></i> 同步任务</a>
  </div>

  <div class="main">
    <!-- 仪表盘 -->
    <div class="section active" id="section-dashboard">
      <div class="stats" id="stats-cards"></div>
      <div class="card">
        <h3>学院分布</h3>
        <table id="dept-table"><tbody></tbody></table>
      </div>
    </div>

    <!-- 用户管理 -->
    <div class="section" id="section-users">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <h3 style="margin:0;">用户列表</h3>
          <button onclick="syncUsers()"><i data-lucide="refresh-cw" style="width:14px;height:14px;vertical-align:-2px;margin-right:4px;"></i>同步教师</button>
        </div>
        <table id="users-table"><thead><tr><th>ID</th><th>工号</th><th>姓名</th><th>角色</th><th>部门</th><th>创建时间</th></tr></thead><tbody></tbody></table>
      </div>
    </div>

    <!-- 数据源 -->
    <div class="section" id="section-datasource">
      <div class="card">
        <h3>数据库连接</h3>
        <div id="ds-status"></div>
      </div>
    </div>

    <!-- 指标管理 -->
    <div class="section" id="section-metrics">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <h3 style="margin:0;"><i data-lucide="bar-chart-2" style="width:18px;height:18px;vertical-align:-3px;margin-right:6px;"></i>指标管理 <span style="font-size:12px;color:#b2bec3;" id="metric-count"></span></h3>
          <div style="display:flex;gap:8px;">
            <button onclick="showAiGenerate()" style="background:#8b5cf6;"><i data-lucide="sparkles" style="width:14px;height:14px;vertical-align:-2px;margin-right:4px;"></i>AI生成</button>
            <button onclick="showMetricForm()"><i data-lucide="plus" style="width:14px;height:14px;vertical-align:-2px;margin-right:4px;"></i>手动</button>
          </div>
        </div>
        <!-- 筛选栏 -->
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;">
          <input id="m-search" placeholder="搜索指标名/ID..." style="flex:1;min-width:180px;border:1px solid #e0e3eb;border-radius:6px;padding:6px 10px;font-size:13px;" oninput="renderMetricTable()">
          <select id="m-filter-cat" style="border:1px solid #e0e3eb;border-radius:6px;padding:6px 8px;font-size:12px;" onchange="renderMetricTable()">
            <option value="">全部分类</option>
          </select>
          <select id="m-filter-chart" style="border:1px solid #e0e3eb;border-radius:6px;padding:6px 8px;font-size:12px;" onchange="renderMetricTable()">
            <option value="">全部图表</option>
            <option value="kpi_card">KPI卡片</option>
            <option value="pie_chart">饼图</option>
            <option value="bar_chart">柱状图</option>
            <option value="horizontal_bar">横向柱状</option>
            <option value="line_chart">折线图</option>
            <option value="table">表格</option>
            <option value="gauge">仪表盘</option>
          </select>
        </div>
        <!-- AI 生成面板 -->
        <div id="ai-panel" style="display:none;background:#f3e5f5;border:1px solid #ce93d8;border-radius:8px;padding:16px;margin-bottom:16px;">
          <div style="font-size:13px;color:#7b1fa2;margin-bottom:8px;"><i data-lucide="sparkles" style="width:14px;height:14px;vertical-align:-2px;margin-right:4px;"></i>用自然语言描述指标，AI 自动生成 SQL</div>
          <div style="display:flex;gap:8px;">
            <input id="ai-desc" style="flex:1;border:1px solid #ce93d8;border-radius:6px;padding:10px;font-size:14px;" placeholder="例如：统计教师的教材出版数量，按出版社分类">
            <button onclick="aiSuggest()" style="background:#8b5cf6;white-space:nowrap;"><i data-lucide="wand-2" style="width:14px;height:14px;vertical-align:-2px;margin-right:4px;"></i>生成</button>
          </div>
          <div id="ai-result" style="margin-top:8px;font-size:13px;display:none;"></div>
        </div>
        <div id="metric-form" style="display:none;background:#f8f9fa;border-radius:8px;padding:16px;margin-bottom:16px;">
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;font-size:13px;">
            <div><label>指标ID</label><input id="m-id" style="width:100%;border:1px solid #ddd;border-radius:4px;padding:6px;" placeholder="my_new_metric"></div>
            <div><label>名称</label><input id="m-name" style="width:100%;border:1px solid #ddd;border-radius:4px;padding:6px;" placeholder="我的指标"></div>
            <div><label>分类</label><input id="m-cat" style="width:100%;border:1px solid #ddd;border-radius:4px;padding:6px;" placeholder="自定义" value="自定义"></div>
            <div><label>图表类型</label>
              <select id="m-chart" style="width:100%;border:1px solid #ddd;border-radius:4px;padding:6px;">
                <option value="kpi_card">KPI卡片</option><option value="pie_chart">饼图</option>
                <option value="bar_chart">柱状图</option><option value="horizontal_bar">横向柱状</option>
                <option value="line_chart" selected>折线图</option><option value="table">表格</option>
              </select>
            </div>
            <div><label>单位</label><input id="m-unit" style="width:100%;border:1px solid #ddd;border-radius:4px;padding:6px;" placeholder="个"></div>
            <div><label>描述</label><input id="m-desc" style="width:100%;border:1px solid #ddd;border-radius:4px;padding:6px;"></div>
          </div>
          <div style="margin-top:10px;"><label style="font-size:13px;">SQL模板 (:teacher_id, :start_date, :end_date)</label>
            <textarea id="m-sql" style="width:100%;height:100px;border:1px solid #ddd;border-radius:4px;padding:8px;font-family:monospace;font-size:12px;"></textarea>
          </div>
          <div style="margin-top:10px;display:flex;gap:8px;">
            <button onclick="saveMetric()"><i data-lucide="save" style="width:14px;height:14px;vertical-align:-2px;margin-right:4px;"></i>保存</button>
            <button onclick="document.getElementById('metric-form').style.display='none'" style="background:#b2bec3;">取消</button>
          </div>
        </div>
        <div style="max-height:500px;overflow-y:auto;">
          <table id="metrics-table"><thead>
            <tr><th style="width:130px;">ID</th><th>名称</th><th>分类</th><th>图表</th><th>来源</th><th>操作</th></tr>
          </thead><tbody><tr><td colspan="6" style="color:#b2bec3;">加载中...</td></tr></tbody>
        </table>
        </div>
        <!-- 分页 -->
        <div class="pagination" id="metric-pagination" style="display:none;">
          <div class="pagination-info" id="pagination-info"></div>
          <div class="pagination-actions">
            <button id="page-prev" onclick="changePage(-1)">上一页</button>
            <div class="page-numbers" id="page-numbers"></div>
            <button id="page-next" onclick="changePage(1)">下一页</button>
            <div class="page-jump">
              <span style="font-size:12px;color:var(--text-light);">跳至</span>
              <input type="number" id="page-jump-input" min="1" onkeydown="if(event.key==='Enter')jumpToPage()">
              <button onclick="jumpToPage()" style="padding:6px 10px;">GO</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 系统日志 -->
    <div class="section" id="section-logs">
      <div class="card">
        <h3>系统日志
          <span style="font-size:12px;color:var(--text-light);font-weight:normal;margin-left:8px;">最近 500 条，实时刷新</span>
        </h3>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
          <select id="log-level" onchange="refreshLogs()" style="padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;">
            <option value="DEBUG">DEBUG</option>
            <option value="INFO" selected>INFO</option>
            <option value="WARNING">WARNING</option>
            <option value="ERROR">ERROR</option>
          </select>
          <input type="text" id="log-search" placeholder="搜索关键词..." onkeyup="if(event.key==='Enter')refreshLogs()" style="padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;flex:1;min-width:200px;">
          <button onclick="refreshLogs()" style="padding:6px 14px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;">刷新</button>
          <button onclick="toggleAutoRefresh()" id="btn-auto" style="padding:6px 14px;background:var(--success);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;">自动刷新 ON</button>
          <button onclick="clearLogs()" style="padding:6px 14px;background:#fff;color:var(--error);border:1px solid var(--error);border-radius:8px;cursor:pointer;font-size:12px;">清空</button>
        </div>
        <div style="font-size:12px;color:var(--text-light);margin-bottom:8px;">
          共 <span id="log-total">0</span> 条，显示 <span id="log-shown">0</span> 条
        </div>
        <div id="logs-container" style="background:#1e1e1e;color:#ddd;padding:14px;border-radius:8px;max-height:560px;overflow-y:auto;font-family:Consolas,monospace;font-size:11px;line-height:1.6;">
          <div style="color:#888;">加载中...</div>
        </div>
      </div>
    </div>

    <!-- 同步 -->
    <div class="section" id="section-sync">
      <div class="card">
        <h3>同步任务</h3>
        <p style="color:var(--text-light);margin-bottom:12px;">从 MySQL 教师表同步用户账号到认证系统</p>
        <button onclick="runSync()" style="margin-bottom:12px;"><i data-lucide="play" style="width:14px;height:14px;vertical-align:-2px;margin-right:4px;"></i>立即同步</button>
        <div id="sync-result" style="font-size:13px;"></div>
      </div>
    </div>
  </div>
</div>

<script>
let token = '';

// 恢复登录态
(async function restoreLogin() {
  const saved = localStorage.getItem('tr_admin_token');
  if (!saved) return;
  try {
    const res = await fetch('/api/auth/me', {
      headers: { 'Authorization': `Bearer ${saved}` }
    });
    if (res.ok) {
      const user = await res.json();
      if (user.role === 'admin') {
        token = saved;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('admin-name').textContent = `管理员: ${user.name}`;
        loadDashboard();
      }
    }
  } catch(e) { localStorage.removeItem('tr_admin_token'); }
})();

async function adminLogin() {
  const id = document.getElementById('admin-id').value;
  const pw = document.getElementById('admin-pw').value;
  const err = document.getElementById('login-error');
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ teacher_id: id, password: pw }),
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.detail; err.style.display='block'; return; }
    if (data.user.role !== 'admin') { err.textContent = '非管理员账号'; err.style.display='block'; return; }
    token = data.token;
    localStorage.setItem('tr_admin_token', data.token);
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('admin-name').textContent = `管理员: ${data.user.name}`;
    loadDashboard();
  } catch(e) { err.textContent = '网络错误'; err.style.display='block'; }
}

function logout() { token = ''; localStorage.removeItem('tr_admin_token'); location.reload(); }

async function api(url) {
  const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
  return res.json();
}

async function loadDashboard() {
  const data = await api('/api/admin/stats');
  if (data.error) return;
  document.getElementById('stats-cards').innerHTML = `
    <div class="stat"><div class="val">${data.stats.teachers}</div><div class="lbl">教师数</div></div>
    <div class="stat"><div class="val">${data.stats.projects}</div><div class="lbl">项目数</div></div>
    <div class="stat"><div class="val">${data.stats.papers}</div><div class="lbl">论文数</div></div>
    <div class="stat"><div class="val">${data.stats.patents}</div><div class="lbl">专利数</div></div>
    <div class="stat"><div class="val">${data.stats.active_sessions}</div><div class="lbl">活跃会话</div></div>
  `;
  document.getElementById('dept-table').innerHTML = '<thead><tr><th>学院</th><th>教师数</th></tr></thead><tbody>' +
    (data.departments || []).map(d => `<tr><td>${d.name}</td><td>${d.count}</td></tr>`).join('') + '</tbody>';
}

async function loadUsers() {
  const data = await api('/api/admin/users');
  document.getElementById('users-table').innerHTML = '<thead><tr><th>ID</th><th>工号</th><th>姓名</th><th>角色</th><th>部门</th><th>创建时间</th></tr></thead><tbody>' +
    (data.users || []).map(u => `<tr>
      <td>${u.id}</td><td>${u.teacher_id}</td><td>${u.name}</td>
      <td><span class="badge ${u.role}">${u.role}</span></td>
      <td>${u.department||''}</td><td>${u.created_at||''}</td>
    </tr>`).join('') + '</tbody>';
}

async function loadDS() {
  const data = await api('/api/admin/datasource');
  document.getElementById('ds-status').innerHTML = `
    <span class="status-dot ${data.status==='connected'?'ok':'err'}"></span> ${data.status}
    ${data.host ? `<p style="margin-top:8px;font-size:13px;color:var(--text-light);">
      Host: ${data.host}:${data.port} | DB: ${data.database} | 
      教师: ${data.tables?.teachers||0} 条 | 项目: ${data.tables?.projects||0} 条
    </p>` : ''}
    ${data.message ? `<p style="color:var(--error);margin-top:4px;">${data.message}</p>` : ''}
  `;
}

async function syncUsers() { await api('/api/admin/sync'); loadUsers(); }
async function runSync() {
  const data = await api('/api/admin/sync');
  document.getElementById('sync-result').innerHTML = `<i data-lucide="check-circle-2" style="width:14px;height:14px;vertical-align:-2px;margin-right:4px;"></i>${data.message}`;
  lucide.createIcons();
}

function showSection(name, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  const link = el || event.currentTarget;
  if (link) link.classList.add('active');
  if (name === 'dashboard') loadDashboard();
  if (name === 'users') loadUsers();
  if (name === 'datasource') loadDS();
  if (name === 'metrics') loadMetrics();
  if (name === 'logs') {
    refreshLogs();
    if (!_logAutoTimer) toggleAutoRefresh();  // 默认开启自动刷新
  }
}

// ── 指标管理 ──
function showMetricForm(editData) {
  const f = document.getElementById('metric-form');
  f.style.display = 'block';
  if (editData) {
    document.getElementById('m-id').value = editData.metric_id || '';
    document.getElementById('m-id').readOnly = true;
    document.getElementById('m-name').value = editData.name || '';
    document.getElementById('m-cat').value = editData.category || '自定义';
    document.getElementById('m-chart').value = editData.chart_type || 'table';
    document.getElementById('m-unit').value = editData.unit || '';
    document.getElementById('m-desc').value = editData.description || '';
    document.getElementById('m-sql').value = editData.sql_template || '';
  } else {
    document.getElementById('m-id').readOnly = false;
  }
}

// ── 图表类型中文映射 ──
const CHART_CN = {
  kpi_card: 'KPI卡片', pie_chart: '饼图', bar_chart: '柱状图',
  horizontal_bar: '横向柱状', line_chart: '折线图', table: '表格', gauge: '仪表盘'
};

let _allMetrics = [];
let _metricPage = 1;
const _metricPageSize = 10;
let _lastFiltered = [];

async function loadMetrics() {
  const data = await api('/api/admin/metrics');
  _allMetrics = data.metrics || [];
  document.getElementById('metric-count').textContent = `(共 ${_allMetrics.length} 个)`;

  // 填充分类下拉
  const cats = [...new Set(_allMetrics.map(m => m.category))].sort();
  const catSel = document.getElementById('m-filter-cat');
  catSel.innerHTML = '<option value="">全部分类</option>' + cats.map(c => `<option>${c}</option>`).join('');

  // 保留当前页，但若结果集变化导致越界则重置
  renderMetricTable(false);
}

function renderMetricTable(resetPage = true) {
  if (resetPage) _metricPage = 1;

  const search = document.getElementById('m-search').value.toLowerCase().trim();
  const catFilter = document.getElementById('m-filter-cat').value;
  const chartFilter = document.getElementById('m-filter-chart').value;

  _lastFiltered = _allMetrics.filter(m => {
    if (search && !m.name.toLowerCase().includes(search) && !m.metric_id.toLowerCase().includes(search)) return false;
    if (catFilter && m.category !== catFilter) return false;
    if (chartFilter && m.chart_type !== chartFilter) return false;
    return true;
  });

  const total = _lastFiltered.length;
  const totalPages = Math.max(1, Math.ceil(total / _metricPageSize));
  if (_metricPage > totalPages) _metricPage = totalPages;
  if (_metricPage < 1) _metricPage = 1;

  const start = (_metricPage - 1) * _metricPageSize;
  const pageItems = _lastFiltered.slice(start, start + _metricPageSize);

  const tbody = document.querySelector('#metrics-table tbody');
  if (total === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="color:#b2bec3;">无匹配指标</td></tr>';
    document.getElementById('metric-pagination').style.display = 'none';
    return;
  }

  tbody.innerHTML = pageItems.map(m => {
    const isCustom = m.source === '自定义';
    const actions = isCustom
      ? `<span onclick="editMetric('${m.metric_id}')" style="cursor:pointer;color:#0984e3;margin-right:6px;">编辑</span>
         <span onclick="deleteMetric('${m.metric_id}')" style="cursor:pointer;color:#e17055;">删除</span>`
      : `<span onclick="editBuiltin('${m.metric_id}','${m.name.replace(/'/g,"\\'")}','${m.category}','${m.chart_type}','${m.unit||''}','${(m.sql_template||'').replace(/'/g,"\\'").replace(/\n/g,' ').replace(/"/g,'&quot;')}')" style="cursor:pointer;color:#0984e3;">覆盖</span>`;
    const chartCn = CHART_CN[m.chart_type] || m.chart_type;
    return `<tr>
      <td style="font-size:11px;font-family:monospace;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${m.metric_id}">${m.metric_id}</td>
      <td>${m.name}</td>
      <td>${m.category}</td>
      <td><span style="font-size:11px;">${chartCn}</span></td>
      <td><span class="badge ${isCustom?'admin':'teacher'}" style="font-size:10px;">${m.source}</span></td>
      <td style="white-space:nowrap;">${actions}</td>
    </tr>`;
  }).join('');

  renderPagination(total, totalPages, start, pageItems.length);
}

function renderPagination(total, totalPages, start, count) {
  const pg = document.getElementById('metric-pagination');
  if (total <= _metricPageSize) { pg.style.display = 'none'; return; }
  pg.style.display = 'flex';

  document.getElementById('pagination-info').textContent =
    `第 ${start + 1}-${start + count} 条 / 共 ${total} 条`;
  document.getElementById('page-prev').disabled = _metricPage === 1;
  document.getElementById('page-next').disabled = _metricPage === totalPages;

  // 页码：最多显示 5 个，当前页居中
  let pages = [];
  if (totalPages <= 5) {
    pages = Array.from({length: totalPages}, (_, i) => i + 1);
  } else {
    let left = Math.max(1, _metricPage - 2);
    let right = Math.min(totalPages, left + 4);
    if (right - left < 4) left = Math.max(1, right - 4);
    pages = Array.from({length: right - left + 1}, (_, i) => left + i);
  }

  document.getElementById('page-numbers').innerHTML = pages.map(p =>
    `<button class="page-number ${p === _metricPage ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`
  ).join('');
}

function changePage(delta) {
  _metricPage += delta;
  renderMetricTable(false);
}

function goToPage(p) {
  _metricPage = p;
  renderMetricTable(false);
}

function jumpToPage() {
  const input = document.getElementById('page-jump-input');
  const p = parseInt(input.value, 10);
  if (!p || isNaN(p)) return;
  _metricPage = p;
  renderMetricTable(false);
  input.value = '';
}

async function editMetric(id) {
  try {
    const data = await api('/api/admin/metrics');
    const m = data.metrics.find(x => x.metric_id === id);
    if (m) showMetricForm(m);
  } catch(e) { alert('加载失败'); }
}

function editBuiltin(id, name, cat, chart, unit, sql) {
  showMetricForm({
    metric_id: id, name: name, category: cat,
    chart_type: chart, unit: unit, sql_template: sql, description: ''
  });
}

async function saveMetric() {
  const body = {
    metric_id: document.getElementById('m-id').value,
    name: document.getElementById('m-name').value,
    sql_template: document.getElementById('m-sql').value,
    category: document.getElementById('m-cat').value,
    chart_type: document.getElementById('m-chart').value,
    unit: document.getElementById('m-unit').value,
    description: document.getElementById('m-desc').value,
  };
  if (!body.metric_id || !body.name || !body.sql_template) { alert('请填写ID/名称/SQL'); return; }
  await fetch('/api/admin/metrics', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
    body: JSON.stringify(body),
  });
  document.getElementById('metric-form').style.display = 'none';
  loadMetrics();
}

// ── AI 辅助生成 ──
function showAiGenerate() {
  document.getElementById('ai-panel').style.display = 'block';
  document.getElementById('ai-result').style.display = 'none';
}

async function aiSuggest() {
  const desc = document.getElementById('ai-desc').value;
  if (!desc) { alert('请输入指标描述'); return; }
  const r = document.getElementById('ai-result');
  r.style.display = 'block';
  r.innerHTML = '⏳ AI 正在分析 Schema...';

  try {
    const res = await fetch('/api/admin/metrics/suggest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ description: desc }),
    });
    const data = await res.json();
    if (!res.ok) { r.innerHTML = `<span style="color:var(--error)">${data.detail}</span>`; return; }

    r.innerHTML = `
      <div style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:12px;padding:12px;">
        <b style="color:var(--success);">AI 建议：</b>
        <span>${data.name} (${data.metric_id}) · ${data.category} · ${data.chart_type}</span>
        <pre style="background:rgba(0,0,0,0.03);padding:8px;border-radius:8px;font-size:11px;max-height:80px;overflow:auto;margin:8px 0;">${data.sql_template}</pre>
        ${data.explanation ? `<span style="color:var(--text-light);">${data.explanation}</span>` : ''}
        <div style="margin-top:8px;display:flex;gap:8px;">
          <button onclick="confirmAiSave()"><i data-lucide="check" style="width:14px;height:14px;vertical-align:-2px;margin-right:4px;"></i>确认，去保存</button>
          <button onclick="document.getElementById('ai-result').style.display='none'" style="background:#b2bec3;">取消</button>
        </div>
      </div>`;
    window._aiSuggestion = data;
    lucide.createIcons();
  } catch(e) { r.innerHTML = `<span style="color:var(--error)">${e.message}</span>`; }
}

function confirmAiSave() {
  const d = window._aiSuggestion;
  if (!d) return;
  document.getElementById('m-id').value = d.metric_id;
  document.getElementById('m-id').readOnly = true;
  document.getElementById('m-name').value = d.name;
  document.getElementById('m-cat').value = d.category;
  document.getElementById('m-chart').value = d.chart_type;
  document.getElementById('m-unit').value = d.unit;
  document.getElementById('m-desc').value = d.description || '';
  document.getElementById('m-sql').value = d.sql_template;
  document.getElementById('metric-form').style.display = 'block';
  document.getElementById('ai-result').style.display = 'none';
}

async function deleteMetric(id) {
  if (!confirm('确定删除此指标？')) return;
  await fetch(`/api/admin/metrics/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
  loadMetrics();
}

// ── 系统日志 ──
let _logAutoTimer = null;
async function refreshLogs() {
  const level = document.getElementById('log-level').value;
  const search = document.getElementById('log-search').value;
  try {
    const res = await fetch(`/api/admin/logs?level=${level}&limit=500${search ? '&search='+encodeURIComponent(search) : ''}`,
      { headers: { 'Authorization': `Bearer ${token}` } });
    const data = await res.json();
    document.getElementById('log-total').textContent = data.total;
    document.getElementById('log-shown').textContent = data.returned;
    const container = document.getElementById('logs-container');
    if (data.logs.length === 0) {
      container.innerHTML = '<div style="color:#888;">暂无日志</div>';
      return;
    }
    const colorMap = { DEBUG:'#888', INFO:'#4ade80', WARNING:'#fbbf24', ERROR:'#f87171', CRITICAL:'#ef4444' };
    const html = data.logs.map(l => {
      const time = l.time;
      const levelColor = colorMap[l.level] || '#ddd';
      return `<div style="margin-bottom:2px;"><span style="color:#888;">[${time}]</span> <span style="color:${levelColor};font-weight:600;">[${l.level}]</span> <span style="color:#60a5fa;">[${l.logger}]</span> ${l.message.replace(/</g,'&lt;')}</div>`;
    }).join('');
    container.innerHTML = html;
    container.scrollTop = container.scrollHeight;
  } catch (e) {
    document.getElementById('logs-container').innerHTML = '<div style="color:#f87171;">加载失败: ' + e.message + '</div>';
  }
}

function toggleAutoRefresh() {
  const btn = document.getElementById('btn-auto');
  if (_logAutoTimer) {
    clearInterval(_logAutoTimer);
    _logAutoTimer = null;
    btn.textContent = '自动刷新 OFF';
    btn.style.background = '#fff';
    btn.style.color = 'var(--text-light)';
    btn.style.border = '1px solid var(--border)';
  } else {
    _logAutoTimer = setInterval(refreshLogs, 3000);
    btn.textContent = '自动刷新 ON';
    btn.style.background = 'var(--success)';
    btn.style.color = '#fff';
  }
}

async function clearLogs() {
  if (!confirm('清空内存日志？')) return;
  await fetch('/api/admin/logs/clear', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
  refreshLogs();
}
</script>
